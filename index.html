<title>Cognitive Revolution RPG — The AI Transformation Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0e1a; color: #e8e8ec;
    font-family: 'Inter', sans-serif;
  }
  #game-canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: auto;
    cursor: default;
  }
  #loading-screen {
    position: fixed; inset: 0; z-index: 100;
    background: #0a0e1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    transition: opacity 0.5s;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  #loading-screen h1 {
    font-size: 36px; font-weight: 700; color: #4af0c0;
    margin-bottom: 16px; letter-spacing: 2px;
  }
  #loading-screen .bar-bg {
    width: 300px; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.1);
  }
  #loading-screen .bar-fill {
    height: 100%; border-radius: 3px;
    background: #4af0c0; width: 0%;
    transition: width 0.3s;
  }
  #loading-screen .load-text {
    margin-top: 12px; font-family: 'Inter', sans-serif;
    font-size: 13px; color: #8888a0;
  }
  footer {
    position: fixed; bottom: 6px; right: 10px; z-index: 50;
    font-size: 11px; opacity: 0.4;
  }
  footer a { color: #8888a0; text-decoration: none; }
  footer a:hover { color: #4af0c0; }
</style>
</head>
<body>

<div id="loading-screen">
  <h1>COGNITIVE REVOLUTION</h1>
  <div class="bar-bg"><div class="bar-fill" id="load-bar"></div></div>
  <div class="load-text" id="load-text">Loading assets...</div>
</div>

<canvas id="game-canvas"></canvas>

<!-- Preload battle backgrounds and title screen via <img> -->
<img id="img-title" src="assets/title-screen.png" style="display:none">
<img id="img-battle-digital" src="assets/battle-bg-digital.png" style="display:none">
<img id="img-battle-corporate" src="assets/battle-bg-corporate.png" style="display:none">
<img id="img-battle-knowledge" src="assets/battle-bg-knowledge.png" style="display:none">
<img id="img-battle-power" src="assets/battle-bg-power.png" style="display:none">
<img id="img-player" src="assets/player-character.png" style="display:none">

<footer>
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<script src="ui.js"></script>
<script src="audio.js"></script>
<script src="data.js"></script>
<script src="combat.js"></script>
<script src="tilemap.js"></script>
<script src="player.js"></script>
<script src="scenes.js"></script>
<script src="engine.js"></script>

<script>
// Wait for fonts and images, then start
document.fonts.ready.then(() => {
  const images = [
    'img-title', 'img-battle-digital', 'img-battle-corporate',
    'img-battle-knowledge', 'img-battle-power', 'img-player'
  ];
  let loaded = 0;
  const total = images.length;
  const bar = document.getElementById('load-bar');
  const text = document.getElementById('load-text');

  function checkReady() {
    loaded++;
    const pct = Math.floor((loaded / total) * 100);
    bar.style.width = pct + '%';
    text.textContent = `Loading assets... ${loaded}/${total}`;
    if (loaded >= total) {
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        setTimeout(() => {
          document.getElementById('loading-screen').style.display = 'none';
          Engine.init();
        }, 500);
      }, 300);
    }
  }

  images.forEach(id => {
    const img = document.getElementById(id);
    if (img.complete && img.naturalWidth > 0) {
      checkReady();
    } else {
      img.onload = checkReady;
      img.onerror = checkReady;
    }
  });
});
</script>
</body>
