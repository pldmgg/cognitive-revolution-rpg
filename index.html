    cp.defending = false;

    switch (action) {
      case 'Attack': {
        const baseDmg = Math.max(1, cp.atk + cp.buffAtk - Math.floor(enemy.def * 0.5));
        const variance = 0.85 + Math.random() * 0.3;
        const isCrit = Math.random() < 0.1;
        const dmg = Math.floor(baseDmg * variance * (isCrit ? 1.8 : 1));
        enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
        this._shakeTarget = 'enemy'; this._shakeTimer = 0.25;
        this._addLog(`${player.name} attacks for ${dmg}${isCrit ? ' (CRIT!)' : ''} damage!`, isCrit ? '#ffdd44' : '#e8e8ec');
        this._spawnFloat(isCrit ? `CRIT! ${dmg}` : `-${dmg}`, this.scale.width * 0.75, this.scale.height * 0.3, isCrit ? '#ffdd44' : '#ff4466');
        if (isCrit) Audio.critHit(); else Audio.attack();
        this._phase = 'player-anim'; this._animTimer = 0.5;
        break;
      }
      case 'Defend': {
        cp.defending = true;
        this._addLog(`${player.name} takes a defensive stance. DEF+50%, +5 MP`);
        cp.mp = Math.min(cp.maxMp, cp.mp + 5);
        Audio.defend();
        this._phase = 'player-anim'; this._animTimer = 0.4;
        break;
      }
      case 'Ability': {
        if (player.abilities.length > 0) {
          this._showAbilities = true;
          this._selectedAbilityIdx = 0;
          this._buildSubMenu('ability');
        }
        break;
      }
      case 'Item': {
        const usable = player.items.filter(i => i.qty > 0);
        if (usable.length > 0) {
          this._showItems = true;
          this._selectedItemIdx = 0;
          this._buildSubMenu('item');
        } else {
          this._addLog('No items to use!', '#ff6666');
        }
        break;
      }
    }
  }

  _buildSubMenu(type) {
    this._subMenuGfx.clear();
    this._subMenuItems.forEach(o => o.destroy());
    this._subMenuItems = [];

    const W = this.scale.width, H = this.scale.height;
    const player = this._player;
    const cp = this._combatPlayer;

    const items = type === 'ability'
      ? player.abilities.map(id => ({ id, data: ABILITIES[id] })).filter(i => i.data)
      : player.items.filter(i => i.qty > 0).map(i => ({ id: i.id, qty: i.qty, data: ITEMS[i.id] })).filter(i => i.data);

    if (items.length === 0) { this._showAbilities = false; this._showItems = false; return; }

    const menuW = 260, menuItemH = 36;
    const menuH = Math.min(items.length * menuItemH + 16, H * 0.35);
    const menuX = W * 0.35, menuY = H * 0.45;

    this._subMenuGfx.fillStyle(0x080c18, 0.95);
    this._subMenuGfx.lineStyle(1, 0x3a3a5e, 1);
    this._subMenuGfx.strokeRect(menuX, menuY, menuW, menuH);
    this._subMenuGfx.fillRect(menuX, menuY, menuW, menuH);
    this._subMenuGfx.fillStyle(0x4af0c0, 0.8);
    this._subMenuGfx.fillRect(menuX, menuY, menuW, 3);

    items.forEach((item, i) => {
      const iy = menuY + 10 + i * menuItemH;
      const isSelected = type === 'ability' ? i === this._selectedAbilityIdx : i === this._selectedItemIdx;
      if (isSelected) {
        this._subMenuGfx.fillStyle(0x4af0c0, 0.12);
        this._subMenuGfx.fillRect(menuX + 2, iy - 2, menuW - 4, menuItemH - 2);
      }
      const label = type === 'ability'
        ? `${item.data.name}  (${item.data.cost} MP)`
        : `${item.data.name} x${item.qty}`;
      const color = type === 'ability'
        ? (cp.mp >= item.data.cost ? (isSelected ? '#4af0c0' : '#e8e8ec') : '#ff4466')
        : (isSelected ? '#4af0c0' : '#e8e8ec');
      const txt = this.add.text(menuX + 12, iy + 10, label, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '13px', fontStyle: isSelected ? 'bold' : 'normal', color
      }).setOrigin(0, 0.5).setDepth(61);
      txt.setInteractive({ cursor: 'pointer' });
      txt.on('pointerdown', () => this._useSubMenuItem(type, i, items));
      this._subMenuItems.push(txt);
    });

    // Close hint
    const closeTxt = this.add.text(menuX + menuW - 8, menuY + 8, '[Esc] Cancel', {
      fontFamily: "'Inter', sans-serif", fontSize: '10px', color: '#666677'
    }).setOrigin(1, 0).setDepth(61);
    this._subMenuItems.push(closeTxt);
  }

  _useSubMenuItem(type, idx, items) {
    const player = this._player, cp = this._combatPlayer, enemy = this._enemy;
    if (type === 'ability') {
      const item = items[idx];
      if (!item) return;
      const ab = item.data;
      if (cp.mp < ab.cost) { this._addLog('Not enough MP!', '#ff4466'); return; }
      cp.mp -= ab.cost;
      Audio.ability();
      this._performAbility(ab, player, cp, enemy);
    } else {
      const item = items[idx];
      if (!item) return;
      const itemData = item.data;
      const playerItem = player.items.find(i => i.id === item.id);
      if (!playerItem || playerItem.qty <= 0) return;
      playerItem.qty--;
      this._useItem(itemData, cp, player);
    }
    this._showAbilities = false;
    this._showItems = false;
    this._subMenuGfx.clear();
    this._subMenuItems.forEach(o => o.destroy());
    this._subMenuItems = [];
    this._phase = 'player-anim';
    this._animTimer = 0.5;
  }

  _performAbility(ab, player, cp, enemy) {
    const W = this.scale.width, H = this.scale.height;
    switch (ab.type) {
      case 'damage': {
        let dmg = Math.floor(cp.int * 2.5);
        if (ab.name === 'Capital Strike') dmg = Math.floor(cp.int * 4);
        else if (ab.name === 'Market Crash') dmg = Math.floor(enemy.maxHp * 0.25);
        else if (ab.name === 'Executive Order') dmg = Math.floor((cp.atk + cp.int) * 2.5);
        dmg = Math.max(1, dmg);
        enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
        this._shakeTarget = 'enemy'; this._shakeTimer = 0.3;
        this._addLog(`${player.name} uses ${ab.name} for ${dmg} damage!`, '#A855F7');
        this._spawnFloat(`-${dmg}`, W * 0.75, H * 0.3, '#A855F7');
        break;
      }
      case 'heal': {
        const healAmt = Math.floor(cp.maxHp * 0.4);
        cp.hp = Math.min(cp.maxHp, cp.hp + healAmt);
        player.statusEffect = null;
        Audio.heal();
        this._addLog(`${player.name} uses ${ab.name}, restoring ${healAmt} HP!`, '#4af0c0');
        this._spawnFloat(`+${healAmt}`, W * 0.25, H * 0.45, '#4af0c0');
        break;
      }
      case 'buff': {
        cp.buffAtk += Math.floor(cp.atk * 0.25);
        cp.buffDef += Math.floor(cp.def * 0.25);
        cp.buffTurns = 3;
        this._addLog(`${player.name} uses ${ab.name}! All stats boosted for 3 turns!`, '#EAB308');
        this._spawnFloat('BOOST!', W * 0.25, H * 0.45, '#EAB308');
        break;
      }
      case 'debuff': {
        enemy.def = Math.floor(enemy.def * 0.6);
        this._addLog(`${player.name} uses ${ab.name}! Enemy DEF reduced!`, '#EC4899');
        this._spawnFloat('DEF-', W * 0.75, H * 0.3, '#EC4899');
        break;
      }
      case 'summon': {
        cp.helperTurns = 3;
        this._addLog(`${player.name} summons a helper bot for 3 turns!`, '#06B6D4');
        this._spawnFloat('HELPER!', W * 0.25, H * 0.45, '#06B6D4');
        break;
      }
    }
  }

  _useItem(itemData, cp, player) {
    const W = this.scale.width, H = this.scale.height;
    switch (itemData.effect) {
      case 'hp': {
        const prev = cp.hp;
        cp.hp = Math.min(cp.maxHp, cp.hp + itemData.value);
        Audio.heal();
        this._addLog(`Used ${itemData.name}, restored ${cp.hp - prev} HP!`, '#4af0c0');
        this._spawnFloat(`+${cp.hp - prev}`, W * 0.25, H * 0.45, '#4af0c0');
        break;
      }
      case 'mp': {
        const prev = cp.mp;
        cp.mp = Math.min(cp.maxMp, cp.mp + itemData.value);
        this._addLog(`Used ${itemData.name}, restored ${cp.mp - prev} MP!`, '#6366f1');
        this._spawnFloat(`+${cp.mp - prev} MP`, W * 0.25, H * 0.45, '#6366f1');
        break;
      }
      case 'full': {
        cp.hp = cp.maxHp; cp.mp = cp.maxMp;
        Audio.heal();
        this._addLog(`Used ${itemData.name}! Full HP and MP restored!`, '#4af0c0');
        this._spawnFloat('FULL RESTORE!', W * 0.25, H * 0.45, '#4af0c0');
        break;
      }
      case 'cure': {
        cp.statusEffect = null;
        this._addLog(`Used ${itemData.name}! Status effects cured.`, '#aaffaa');
        break;
      }
      case 'escape': {
        Audio.mapTravel();
        this._addLog('Used Smoke Bomb! Escaped!', '#ffffff');
        this.time.delayedCall(500, () => {
          this.cameras.main.fadeOut(400, 10, 14, 26);
          this.cameras.main.once('camerafadeoutcomplete', () => {
            this._syncPlayerBack();
            this.scene.start(this._returnScene);
          });
        });
        break;
      }
      case 'buff-atk': {
        cp.buffAtk += itemData.value;
        cp.buffTurns = Math.max(cp.buffTurns || 0, 3);
        this._addLog(`Used ${itemData.name}! ATK+${itemData.value} for 3 turns.`, '#ff8844');
        break;
      }
      case 'buff-def': {
        cp.buffDef += itemData.value;
        cp.buffTurns = Math.max(cp.buffTurns || 0, 3);
        this._addLog(`Used ${itemData.name}! DEF+${itemData.value} for 3 turns.`, '#4488ff');
        break;
      }
    }
  }

  _doEnemyTurn() {
    const cp = this._combatPlayer, enemy = this._enemy, player = this._player;
    const W = this.scale.width, H = this.scale.height;

    // Helper bot bonus
    if (cp.helperTurns > 0) {
      const helperDmg = Math.floor(cp.atk * 0.5);
      enemy.currentHp = Math.max(0, enemy.currentHp - helperDmg);
      cp.helperTurns--;
      this._addLog(`Helper bot attacks for ${helperDmg}!`, '#06B6D4');
      this._spawnFloat(`-${helperDmg}`, W * 0.75, H * 0.3, '#06B6D4');
    }

    // Buff expiry
    if (cp.buffTurns > 0) { cp.buffTurns--; if (cp.buffTurns <= 0) { cp.buffAtk = 0; cp.buffDef = 0; } }

    // Enemy action
    const atkMod = Math.random();
    let dmg;
    if (atkMod < 0.15) {
      // Miss
      this._addLog(`${enemy.name}'s attack missed!`, '#8888a0');
      return;
    } else {
      const baseDmg = Math.max(1, enemy.atk - Math.floor((cp.def + cp.buffDef) * (cp.defending ? 0.75 : 0.5)));
      const variance = 0.85 + Math.random() * 0.3;
      const isCrit = Math.random() < 0.08;
      dmg = Math.floor(baseDmg * variance * (isCrit ? 1.5 : 1));
      cp.hp = Math.max(0, cp.hp - dmg);
      this._shakeTarget = 'player'; this._shakeTimer = 0.25;
      this._addLog(`${enemy.name} attacks for ${dmg}${isCrit ? ' (CRIT!)' : ''} damage!`, isCrit ? '#ffdd44' : '#ff8888');
      this._spawnFloat(`-${dmg}`, W * 0.18, H * 0.45, isCrit ? '#ffdd44' : '#ff4466');
      Audio.enemyHit();
    }
  }

  _checkResult() {
    if (this._enemy.currentHp <= 0) return 'victory';
    if (this._combatPlayer.hp <= 0) return 'defeat';
    return null;
  }

  _syncPlayerBack() {
    const player = this._player;
    player.hp = this._combatPlayer.hp;
    player.mp = this._combatPlayer.mp;
  }

  update(time, delta) {
    const dt = delta / 1000;
    if (this._shakeTimer > 0) this._shakeTimer -= dt;

    // Input handling
    if (this._showAbilities || this._showItems) {
      const type = this._showAbilities ? 'ability' : 'item';
      const items = type === 'ability'
        ? this._player.abilities.map(id => ({ id, data: ABILITIES[id] })).filter(i => i.data)
        : this._player.items.filter(i => i.qty > 0).map(i => ({ id: i.id, qty: i.qty, data: ITEMS[i.id] })).filter(i => i.data);

      if (Phaser.Input.Keyboard.JustDown(this._keyEsc)) {
        this._showAbilities = false; this._showItems = false;
        this._subMenuGfx.clear();
        this._subMenuItems.forEach(o => o.destroy());
        this._subMenuItems = [];
      } else if (Phaser.Input.Keyboard.JustDown(this._cursors.up)) {
        const idx = type === 'ability' ? this._selectedAbilityIdx : this._selectedItemIdx;
        if (type === 'ability') this._selectedAbilityIdx = Math.max(0, idx - 1);
        else this._selectedItemIdx = Math.max(0, idx - 1);
        this._buildSubMenu(type);
      } else if (Phaser.Input.Keyboard.JustDown(this._cursors.down)) {
        const idx = type === 'ability' ? this._selectedAbilityIdx : this._selectedItemIdx;
        if (type === 'ability') this._selectedAbilityIdx = Math.min(items.length - 1, idx + 1);
        else this._selectedItemIdx = Math.min(items.length - 1, idx + 1);
        this._buildSubMenu(type);
      } else if (Phaser.Input.Keyboard.JustDown(this._keyEnter) || Phaser.Input.Keyboard.JustDown(this._keySpace)) {
        const idx = type === 'ability' ? this._selectedAbilityIdx : this._selectedItemIdx;
        this._useSubMenuItem(type, idx, items);
      }
    } else {
      switch (this._phase) {
        case 'choose':
          if (Phaser.Input.Keyboard.JustDown(this._cursors.up))   this._selectedAction = (this._selectedAction - 2 + 4) % 4;
          if (Phaser.Input.Keyboard.JustDown(this._cursors.down)) this._selectedAction = (this._selectedAction + 2) % 4;
          if (Phaser.Input.Keyboard.JustDown(this._cursors.left)) this._selectedAction = (this._selectedAction % 2 === 1) ? this._selectedAction - 1 : this._selectedAction;
          if (Phaser.Input.Keyboard.JustDown(this._cursors.right))this._selectedAction = (this._selectedAction % 2 === 0) ? this._selectedAction + 1 : this._selectedAction;
          if (Phaser.Input.Keyboard.JustDown(this._keyEnter) || Phaser.Input.Keyboard.JustDown(this._keySpace)) {
            const actions = ['Attack','Defend','Ability','Item'];
            this._executeAction(actions[this._selectedAction]);
          }
          break;
        case 'player-anim':
          this._animTimer -= dt;
          if (this._animTimer <= 0) {
            const r = this._checkResult();
            if (r) { this._result = r; this._phase = 'result'; this._resultTimer = 0; }
            else { this._phase = 'enemy-turn'; this._animTimer = 0.3; }
          }
          break;
        case 'enemy-turn':
          this._animTimer -= dt;
          if (this._animTimer <= 0) {
            this._doEnemyTurn();
            this._phase = 'enemy-anim'; this._animTimer = 0.6;
          }
          break;
        case 'enemy-anim':
          this._animTimer -= dt;
          if (this._animTimer <= 0) {
            const r = this._checkResult();
            if (r) { this._result = r; this._phase = 'result'; this._resultTimer = 0; }
            else this._phase = 'choose';
          }
          break;
        case 'result':
          this._resultTimer += dt;
          if (this._resultTimer > 1 && (Phaser.Input.Keyboard.JustDown(this._keyEnter) || Phaser.Input.Keyboard.JustDown(this._keySpace))) {
            this._endBattle();
          }
          break;
      }
    }

    this._render(time / 1000);
  }

  _endBattle() {
    const player = this._player;
    const cp = this._combatPlayer;

    if (this._result === 'victory') {
      Audio.victory();
      player.gold += this._enemy.goldReward;
      const leveled = gainXP(player, this._enemy.xpReward);
      player.hp = cp.hp;
      player.mp = cp.mp;
      if (leveled) Audio.levelUp();
    } else {
      Audio.defeat();
      player.hp = Math.max(1, Math.floor(player.maxHp / 2));
      player.mp = Math.floor(player.maxMp / 2);
    }
    this.registry.set('player', player);

    this.cameras.main.fadeOut(400, 10, 14, 26);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start(this._returnScene);
    });
  }

  _render(time) {
    const W = this.scale.width, H = this.scale.height;
    const cp = this._combatPlayer, enemy = this._enemy, player = this._player;

    this._uiGfx.clear();
    this._enemyGfx.clear();
    this._playerGfx.clear();

    // Shake
    const shakeX = (this._shakeTimer > 0) ? (Math.random() - 0.5) * 8 : 0;
    const enemyOffsetX = this._shakeTarget === 'enemy' ? shakeX : 0;
    const playerOffsetX = this._shakeTarget === 'player' ? shakeX : 0;

    // Draw enemy
    this._drawEnemy(this._enemyGfx, W * 0.75 + enemyOffsetX, H * 0.35, enemy, time);

    // Draw player
    this._drawCombatPlayer(this._playerGfx, W * 0.18 + playerOffsetX, H * 0.42, player, time);

    // Enemy HP bar
    const epx = W * 0.6, epy = H * 0.22;
    drawBar(this._uiGfx, epx, epy, 180, 14, enemy.currentHp, enemy.maxHp, 0xff4466, 0x200010);
    this._uiGfx.fillStyle(0xff4466, 0.8);
    this._enemyNameText.setX(W * 0.75 + enemyOffsetX);

    // Player stats panel
    const ppx = W * 0.03, ppy = H * 0.6;
    this._uiGfx.fillStyle(0x080c18, 0.9);
    this._uiGfx.lineStyle(1, 0x2a2a4e, 1);
    this._uiGfx.strokeRect(ppx, ppy, 290, 160);
    this._uiGfx.fillRect(ppx, ppy, 290, 160);
    this._uiGfx.fillStyle(Hex2Int(player.color), 0.3);
    this._uiGfx.fillRect(ppx, ppy, 290, 4);
    this._playerNameText.setY(H * 0.62 + 2);
    drawBar(this._uiGfx, ppx + 12, ppy + 36, 255, 14, cp.hp, cp.maxHp, 0x4af0c0, 0x0a2020);
    drawBar(this._uiGfx, ppx + 12, ppy + 56, 255, 14, cp.mp, cp.maxMp, 0x6366f1, 0x0a0a20);
    // HP/MP text
    this._uiGfx.fillStyle(0x4af0c0, 0.7);

    // Action buttons
    if (this._phase === 'choose' && !this._showAbilities && !this._showItems) {
      const actions = ['Attack', 'Defend', 'Ability', 'Item'];
      this._actionBtns.forEach(({ gfx, bx, by, idx, color }) => {
        const isSelected = idx === this._selectedAction;
        gfx.clear();
        gfx.fillStyle(color, isSelected ? 0.35 : 0.15);
        gfx.lineStyle(1, color, isSelected ? 1 : 0.5);
        gfx.strokeRoundedRect(bx, by, W * 0.16, 38, 4);
        gfx.fillRoundedRect(bx, by, W * 0.16, 38, 4);
        if (isSelected) {
          gfx.lineStyle(1, color, 0.4);
          gfx.strokeRoundedRect(bx - 2, by - 2, W * 0.16 + 4, 42, 5);
        }
      });
      this._actionBtns.forEach(({ txt }) => txt.setVisible(true));
    } else {
      this._actionBtns.forEach(({ gfx, txt }) => { gfx.clear(); txt.setVisible(false); });
    }

    // Combat log
    this._logGfx.clear();
    this._logGfx.fillStyle(0x060a14, 0.88);
    this._logGfx.lineStyle(1, 0x2a2a4a, 1);
    this._logGfx.strokeRect(W * 0.55, H * 0.68, W * 0.42, H * 0.28);
    this._logGfx.fillRect(W * 0.55, H * 0.68, W * 0.42, H * 0.28);

    // Result overlay
    if (this._phase === 'result') {
      const alpha = Math.min(0.8, this._resultTimer * 0.6);
      this._uiGfx.fillStyle(0x0a0e1a, alpha);
      this._uiGfx.fillRect(0, 0, W, H);
      if (this._resultTimer > 1) {
        // Pulsing continue text drawn elsewhere
      }
    }
  }

  _drawEnemy(g, x, y, enemy, time) {
    const c = enemy.color || 0xff4466;
    const bob = Math.sin(time * 1.5) * 3;
    const hpPct = enemy.currentHp / enemy.maxHp;

    // Shadow
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(x, y + 50, 80, 20);

    // Body (abstract AI entity)
    g.fillStyle(c, 0.9);
    g.fillRect(x - 28, y - 20 + bob, 56, 70);

    // Face/features
    g.fillStyle(0x000000, 0.4);
    g.fillRect(x - 20, y - 8 + bob, 16, 12);
    g.fillRect(x + 4, y - 8 + bob, 16, 12);

    // "Eyes" glow
    g.fillStyle(0xffffff, 0.9);
    g.fillRect(x - 16, y - 5 + bob, 8, 6);
    g.fillRect(x + 8, y - 5 + bob, 8, 6);

    // HP-based tinting
    if (hpPct < 0.3) {
      g.fillStyle(0xff0000, 0.3 * (1 - hpPct));
      g.fillRect(x - 28, y - 20 + bob, 56, 70);
      g.lineStyle(1, 0xff0000, 0.4);
      g.lineBetween(x - 10, y - 20 + bob, x, y + 20 + bob);
      g.lineBetween(x + 5, y - 15 + bob, x + 20, y + 10 + bob);
    }

    // Glow
    g.fillStyle(c, 0.2 + Math.sin(time * 3) * 0.1);
    g.fillCircle(x, y + bob, 48);
    g.fillStyle(c, 0.1);
    g.fillCircle(x, y + bob, 64);
  }

  _drawCombatPlayer(g, x, y, player, time) {
    const color = Hex2Int(player.color);
    const bob = Math.sin(time * 2) * 2;
    const cp = this._combatPlayer;

    // Try to use character sprite
    if (!this._battlePlayerSprite && this.textures.exists('char-0-idle')) {
      this._battlePlayerSprite = this.add.image(x, y + 44, 'char-0-idle')
        .setOrigin(0.5, 1).setScale(0.18).setDepth(20);
    }
    if (this._battlePlayerSprite) {
      this._battlePlayerSprite.setPosition(x, y + 44 + bob);
      this._battlePlayerSprite.setVisible(true);
    }

    // Shadow
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(x, y + 44, 36, 12);

    if (!this._battlePlayerSprite) {
      // Fallback shape drawing
      g.fillStyle(color, 0.9);
      g.fillRect(x - 16, y - 14 + bob, 32, 40);
      g.fillStyle(0xe8c8a0, 1);
      g.fillCircle(x, y - 22 + bob, 14);
      g.fillStyle(0x3a2010, 1);
      g.fillCircle(x, y - 28 + bob, 14);
      g.fillStyle(0xe8c8a0, 1);
      g.fillRect(x - 14, y - 22 + bob, 28, 14);
    }

    if (cp.defending) {
      g.fillStyle(0x3B82F6, 0.4);
      g.fillCircle(x, y + bob, 30);
      g.lineStyle(2, 0x3B82F6, 0.8);
      g.strokeCircle(x, y + bob, 30);
    }
    g.fillStyle(color, 0.25);
    g.fillCircle(x, y + bob, 18);
  }
}

/* ==========================================================================
   DIALOG SCENE (overlay)
   ========================================================================== */
class DialogScene extends Phaser.Scene {
  constructor() { super({ key: 'Dialog' }); }

  init(data) {
    this._name = data.name || '';
    this._dialogue = data.dialogue || ['...'];
    this._color = data.color || '#aaaacc';
    this._parentScene = data.parentScene || null;
    this._currentLine = 0;
    this._charIndex = 0;
    this._charTimer = 0;
    this._revealed = false;
    this._portraitKey = data.portrait || null;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this._gfx = this.add.graphics().setDepth(300);

    // Overlay
    this._overlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.35).setDepth(299);

    // Name text
    this._nameText = this.add.text(0, 0, '', {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '18px', fontStyle: 'bold',
      color: this._color,
      shadow: { color: '#000', blur: 6, fill: true }
    }).setDepth(302);

    // Dialog text
    this._dialogText = this.add.text(0, 0, '', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '14px', color: '#e8e8ec',
      wordWrap: { width: 600 }
    }).setDepth(302);

    // Continue arrow
    this._continueArrow = this.add.text(0, 0, '▼', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '14px', color: '#4af0c0'
    }).setDepth(302).setVisible(false);

    // Page counter
    this._pageText = this.add.text(0, 0, '', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '11px', color: '#555566'
    }).setDepth(302);

    // Portrait image (if available)
    this._portraitImg = null;
    const portraitKey = this._portraitKey || ('portrait-' + this._name.toLowerCase().replace(/[^a-z-]/g, '').replace(/\s+/g, '-'));
    if (this.textures.exists(portraitKey)) {
      this._portraitImg = this.add.image(0, 0, portraitKey).setDepth(302);
    }

    // Input
    this._spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this._escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this._eKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

    this.input.on('pointerdown', () => this._advance());

    this._updateLayout();
  }

  _updateLayout() {
    const W = this.scale.width, H = this.scale.height;
    const boxW = Math.min(720, W * 0.85);
    const boxH = 150;
    const boxX = (W - boxW) / 2;
    const boxY = H - boxH - 30;
    const colorInt = parseInt(this._color.replace('#', ''), 16);

    this._gfx.clear();
    this._gfx.fillStyle(0x060a14, 0.95);
    this._gfx.lineStyle(2, colorInt, 0.7);
    this._gfx.strokeRoundedRect(boxX, boxY, boxW, boxH, 6);
    this._gfx.fillRoundedRect(boxX, boxY, boxW, boxH, 6);
    this._gfx.lineStyle(1, colorInt, 0.3);
    this._gfx.strokeRoundedRect(boxX + 2, boxY + 2, boxW - 4, boxH - 4, 5);

    // Top accent bar
    this._gfx.fillStyle(colorInt, 0.4);
    this._gfx.fillRoundedRect(boxX, boxY, boxW, 3, { tl: 6, tr: 6, bl: 0, br: 0 });

    // Portrait circle or image
    if (this._portraitImg) {
      this._portraitImg.setPosition(boxX + 48, boxY + boxH/2);
      this._portraitImg.setDisplaySize(72, 72);
      // Circular mask
      const mask = this.make.graphics({add: false});
      mask.fillStyle(0xffffff, 1);
      mask.fillCircle(boxX + 48, boxY + boxH/2, 38);
      this._portraitImg.setMask(mask.createGeometryMask());
    } else {
      // Fallback circle
      const colorInt2 = parseInt(this._color.replace('#', ''), 16);
      this._gfx.fillStyle(colorInt2, 0.25);
      this._gfx.fillCircle(boxX + 48, boxY + boxH/2, 36);
      this._gfx.fillStyle(colorInt2, 0.7);
      this._gfx.fillCircle(boxX + 48, boxY + boxH/2 - 8, 10);
      this._gfx.fillStyle(colorInt2, 0.7);
      this._gfx.fillRect(boxX + 40, boxY + boxH/2 + 4, 16, 18);
    }

    // Name
    this._nameText.setPosition(boxX + 90, boxY + 14);
    this._dialogText.setPosition(boxX + 90, boxY + 38);
    this._dialogText.setWordWrapWidth(boxW - 105);
    this._continueArrow.setPosition(boxX + boxW - 22, boxY + boxH - 22);
    this._pageText.setPosition(boxX + boxW - 20, boxY + 12).setOrigin(1, 0);
    this._pageText.setText(`${this._currentLine + 1}/${this._dialogue.length}`);

    this._nameText.setText(this._name).setColor(this._color);
  }

  _advance() {
    if (!this._revealed) {
      // Skip typewriter
      this._charIndex = this._dialogue[this._currentLine].length;
      this._revealed = true;
    } else {
      this._currentLine++;
      if (this._currentLine >= this._dialogue.length) {
        this._close();
        return;
      }
      this._charIndex = 0;
      this._charTimer = 0;
      this._revealed = false;
      this._continueArrow.setVisible(false);
    }
    this._updateLayout();
  }

  _close() {
    Audio.uiClick();
    if (this._parentScene) {
      this.scene.stop();
      this.scene.resume(this._parentScene);
    } else {
      this.scene.stop();
    }
  }

  update(time, delta) {
    const dt = delta / 1000;

    // Typewriter
    if (!this._revealed && this._dialogue[this._currentLine]) {
      this._charTimer += dt;
      while (this._charTimer >= 0.03 && this._charIndex < this._dialogue[this._currentLine].length) {
        this._charIndex++;
        this._charTimer -= 0.03;
        if (this._charIndex % 3 === 0) Audio.textBlip();
      }
      if (this._charIndex >= this._dialogue[this._currentLine].length) this._revealed = true;
    }

    const line = this._dialogue[this._currentLine] || '';
    this._dialogText.setText(line.substring(0, this._charIndex));
    this._continueArrow.setVisible(this._revealed);

    // Blink arrow
    if (this._revealed) {
      this._continueArrow.setAlpha(0.6 + Math.sin(time * 0.006) * 0.4);
    }

    // Key input
    if (Phaser.Input.Keyboard.JustDown(this._enterKey) || Phaser.Input.Keyboard.JustDown(this._spaceKey) || Phaser.Input.Keyboard.JustDown(this._eKey)) {
      this._advance();
    }
    if (Phaser.Input.Keyboard.JustDown(this._escKey)) {
      this._close();
    }
  }
}

/* ==========================================================================
   INSIGHT SCENE (overlay for knowledge points)
   ========================================================================== */
class InsightScene extends Phaser.Scene {
  constructor() { super({ key: 'Insight' }); }

  init(data) {
    this._insight = data.insight;
    this._player = data.player || null;
    this._parentScene = data.parentScene || null;
    this._awarded = false;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const insight = this._insight;
    const player = this._player || this.registry.get('player');
    if (insight && player) this._awarded = addInsight(player, insight.id);
    this.registry.set('player', player);

    // Overlay
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.65).setDepth(400);

    const panelW = Math.min(520, W * 0.65);
    const panelH = 300;
    const px = (W - panelW) / 2;
    const py = (H - panelH) / 2;

    const typeColors = { trend: '#3B82F6', tension: '#ff4466', impact: '#4af0c0' };
    const typeColor = typeColors[(insight && insight.type) || 'trend'] || '#4af0c0';
    const typeColorInt = parseInt(typeColor.replace('#',''), 16);

    const g = this.add.graphics().setDepth(401);
    g.fillStyle(0x060a14, 0.98);
    g.lineStyle(2, typeColorInt, 0.8);
    g.strokeRoundedRect(px, py, panelW, panelH, 8);
    g.fillRoundedRect(px, py, panelW, panelH, 8);
    g.fillStyle(typeColorInt, 0.4);
    g.fillRoundedRect(px, py, panelW, 3, { tl: 8, tr: 8, bl: 0, br: 0 });

    // Type badge
    this.add.text(px + 16, py + 14, (insight ? insight.type : 'INSIGHT').toUpperCase(), {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', fontStyle: 'bold',
      color: typeColor, letterSpacing: 2
    }).setDepth(402);

    // Title
    this.add.text(px + 16, py + 36, insight ? insight.title : 'Insight', {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '22px', fontStyle: 'bold', color: '#ffffff'
    }).setDepth(402);

    // Big stat
    this.add.text(px + panelW / 2, py + 90, insight ? insight.stat : '', {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '46px', fontStyle: 'bold', color: typeColor,
      shadow: { color: typeColor, blur: 20, fill: true }
    }).setOrigin(0.5, 0.5).setDepth(402);

    this.add.text(px + panelW / 2, py + 126, insight ? insight.statLabel : '', {
      fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#8888a0'
    }).setOrigin(0.5, 0.5).setDepth(402);

    // Summary
    this.add.text(px + 16, py + 158, insight ? insight.summary : '', {
      fontFamily: "'Inter', sans-serif", fontSize: '13px', color: '#c8c8d0',
      wordWrap: { width: panelW - 32 }
    }).setDepth(402);

    // Award notice
    if (this._awarded) {
      this.add.text(px + panelW / 2, py + 250, '✦ Knowledge Absorbed! Stats increased!', {
        fontFamily: "'Inter', sans-serif", fontSize: '14px', fontStyle: 'bold', color: '#4af0c0'
      }).setOrigin(0.5, 0.5).setDepth(402);
    }

    // Close hint
    this.add.text(px + panelW / 2, py + panelH - 14, 'Press Enter / Space to close', {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#555566'
    }).setOrigin(0.5, 1).setDepth(402);

    // Input
    this._enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this._spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this.input.on('pointerdown', () => this._close());
  }

  update() {
    if (Phaser.Input.Keyboard.JustDown(this._enterKey) || Phaser.Input.Keyboard.JustDown(this._spaceKey) || Phaser.Input.Keyboard.JustDown(this._escKey)) {
      this._close();
    }
  }

  _close() {
    Audio.uiClick();
    this.scene.stop();
    if (this._parentScene) this.scene.resume(this._parentScene);
  }
}

/* ==========================================================================
   SHOP SCENE (overlay)
   ========================================================================== */
class ShopScene extends Phaser.Scene {
  constructor() { super({ key: 'Shop' }); }

  init(data) {
    this._items = data.items || [];
    this._title = data.title || 'Shop';
    this._parentScene = data.parentScene || null;
    this._selectedIdx = 0;
    this._message = '';
    this._messageTimer = 0;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const player = this.registry.get('player');
    this._player = player;

    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.65).setDepth(400);

    const panelW = Math.min(520, W * 0.65);
    const panelH = Math.min(420, H * 0.7);
    const px = (W - panelW) / 2;
    const py = (H - panelH) / 2;

    this._gfx = this.add.graphics().setDepth(401);
    this._drawPanel(px, py, panelW, panelH, player);

    // Title
    this._titleText = this.add.text(px + 16, py + 16, this._title, {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '24px', fontStyle: 'bold', color: '#4af0c0'
    }).setDepth(402);

    // Gold
    this._goldText = this.add.text(px + panelW - 16, py + 20, `${player.gold}g`, {
      fontFamily: "'Inter', sans-serif",
      fontSize: '16px', fontStyle: 'bold', color: '#EAB308'
    }).setOrigin(1, 0).setDepth(402);

    // Item list
    this._itemTexts = [];
    this._itemZones = [];
    this._items.forEach((itemId, i) => {
      const item = ITEMS[itemId];
      if (!item) return;
      const iy = py + 60 + i * 44;
      const nameTxt = this.add.text(px + 20, iy + 8, item.name, {
        fontFamily: "'Inter', sans-serif", fontSize: '15px', color: '#e8e8ec'
      }).setDepth(402);
      const descTxt = this.add.text(px + 20, iy + 26, item.desc, {
        fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#8888a0'
      }).setDepth(402);
      const costTxt = this.add.text(px + panelW - 20, iy + 16, `${item.cost}g`, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '15px', fontStyle: 'bold',
        color: player.gold >= item.cost ? '#EAB308' : '#ff4466'
      }).setOrigin(1, 0.5).setDepth(402);
      const zone = this.add.zone(px + panelW/2, iy + 22, panelW - 4, 40).setInteractive({ cursor: 'pointer' }).setDepth(402);
      zone.on('pointerdown', () => { this._selectedIdx = i; this._buy(i); });
      zone.on('pointerover', () => { this._selectedIdx = i; this._refreshPanel(px, py, panelW, panelH, player); });
      this._itemTexts.push({ nameTxt, descTxt, costTxt, iy });
      this._itemZones.push(zone);
    });

    // Message
    this._msgText = this.add.text(px + panelW/2, py + panelH - 58, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '14px', fontStyle: 'bold', color: '#4af0c0'
    }).setOrigin(0.5, 0.5).setDepth(402);

    // Leave button
    const leaveGfx = this.add.graphics().setDepth(401);
    const leaveTxt = this.add.text(px + panelW/2, py + panelH - 26, 'Leave', {
      fontFamily: "'Inter', sans-serif", fontSize: '16px', fontStyle: 'bold', color: '#e8e8ec'
    }).setOrigin(0.5, 0.5).setDepth(402);
    leaveGfx.fillStyle(0x2a2a4a, 0.8);
    leaveGfx.lineStyle(1, 0x4a4a6a, 1);
    leaveGfx.strokeRoundedRect(px + panelW/2 - 55, py + panelH - 40, 110, 30, 4);
    leaveGfx.fillRoundedRect(px + panelW/2 - 55, py + panelH - 40, 110, 30, 4);
    const leaveZone = this.add.zone(px + panelW/2, py + panelH - 26, 110, 30).setInteractive({ cursor: 'pointer' }).setDepth(402);
    leaveZone.on('pointerdown', () => this._close());

    // Input
    this._upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
    this._downKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN);
    this._enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this._escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

    this._px = px; this._py = py; this._panelW = panelW; this._panelH = panelH;
  }

  _drawPanel(px, py, panelW, panelH, player) {
    this._gfx.clear();
    this._gfx.fillStyle(0x060a14, 0.96);
    this._gfx.lineStyle(1, 0x3a3a5e, 1);
    this._gfx.strokeRoundedRect(px, py, panelW, panelH, 6);
    this._gfx.fillRoundedRect(px, py, panelW, panelH, 6);
    this._gfx.fillStyle(0x4af0c0, 0.4);
    this._gfx.fillRoundedRect(px, py, panelW, 3, { tl: 6, tr: 6, bl: 0, br: 0 });
    // Selection highlight
    const idx = this._selectedIdx;
    if (idx >= 0 && idx < this._items.length) {
      const iy = py + 60 + idx * 44;
      this._gfx.fillStyle(0x4af0c0, 0.08);
      this._gfx.fillRect(px + 2, iy, panelW - 4, 42);
    }
  }

  _refreshPanel(px, py, panelW, panelH, player) {
    this._drawPanel(px, py, panelW, panelH, player);
  }

  _buy(idx) {
    const player = this._player;
    const itemId = this._items[idx];
    const item = ITEMS[itemId];
    if (!item) return;
    if (player.gold >= item.cost) {
      player.gold -= item.cost;
      const existing = player.items.find(i => i.id === itemId);
      if (existing) existing.qty++;
      else player.items.push({ id: itemId, qty: 1 });
      Audio.buy();
      this._message = `Bought ${item.name}!`;
      this._messageTimer = 1.5;
      this._goldText.setText(`${player.gold}g`);
      this.registry.set('player', player);
    } else {
      this._message = 'Not enough gold!';
      this._messageTimer = 1.5;
    }
    this._drawPanel(this._px, this._py, this._panelW, this._panelH, player);
  }

  _close() {
    Audio.uiClick();
    this.scene.stop();
    if (this._parentScene) this.scene.resume(this._parentScene);
  }

  update(time, delta) {
    const dt = delta / 1000;
    if (this._messageTimer > 0) {
      this._messageTimer -= dt;
      this._msgText.setText(this._message).setAlpha(Math.min(1, this._messageTimer * 2));
    } else {
      this._msgText.setText('');
    }

    if (Phaser.Input.Keyboard.JustDown(this._upKey)) {
      this._selectedIdx = Math.max(0, this._selectedIdx - 1);
      this._drawPanel(this._px, this._py, this._panelW, this._panelH, this._player);
    }
    if (Phaser.Input.Keyboard.JustDown(this._downKey)) {
      this._selectedIdx = Math.min(this._items.length - 1, this._selectedIdx + 1);
      this._drawPanel(this._px, this._py, this._panelW, this._panelH, this._player);
    }
    if (Phaser.Input.Keyboard.JustDown(this._enterKey)) this._buy(this._selectedIdx);
    if (Phaser.Input.Keyboard.JustDown(this._escKey)) this._close();
  }
}

/* ==========================================================================
   INVENTORY SCENE (overlay)
   ========================================================================== */
class InventoryScene extends Phaser.Scene {
  constructor() { super({ key: 'Inventory' }); }

  init(data) {
    this._parentScene = data.parentScene || null;
    this._tab = 0; // 0=Stats, 1=Abilities, 2=Items, 3=Knowledge
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const player = this.registry.get('player');
    this._player = player;

    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.65).setDepth(400);

    const panelW = Math.min(620, W * 0.75);
    const panelH = Math.min(480, H * 0.78);
    const px = (W - panelW) / 2;
    const py = (H - panelH) / 2;
    this._px = px; this._py = py; this._panelW = panelW; this._panelH = panelH;

    this._gfx = this.add.graphics().setDepth(401);
    this._contentGfx = this.add.graphics().setDepth(401);
    this._contentTexts = [];
    this._tabTexts = [];

    const tabs = ['Stats', 'Abilities', 'Items', 'Knowledge'];
    this._tabTexts = tabs.map((t, i) => {
      const tx = px + 10 + i * (panelW / tabs.length);
      const txt = this.add.text(tx + (panelW / tabs.length)/2 - 5, py + 22, t, {
        fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#8888a0'
      }).setOrigin(0.5, 0.5).setDepth(402);
      const zone = this.add.zone(tx + (panelW / tabs.length)/2, py + 22, panelW / tabs.length - 8, 28).setInteractive({ cursor: 'pointer' }).setDepth(402);
      zone.on('pointerdown', () => { this._tab = i; Audio.uiClick(); this._refresh(); });
      return txt;
    });

    // Close button
    this.add.text(px + panelW - 18, py + 16, '✕', {
      fontFamily: "'Inter', sans-serif", fontSize: '16px', color: '#8888a0'
    }).setOrigin(0.5, 0.5).setDepth(402).setInteractive({ cursor: 'pointer' }).on('pointerdown', () => this._close());

    // Input
    this._escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this._iKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.I);
    this._leftKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT);
    this._rightKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT);

    this._refresh();
  }

  _refresh() {
    const W = this.scale.width;
    const { px, py, panelW, panelH, _player: player } = this;
    const tabs = ['Stats', 'Abilities', 'Items', 'Knowledge'];

    // Clear
    this._gfx.clear();
    this._contentGfx.clear();
    this._contentTexts.forEach(t => t.destroy());
    this._contentTexts = [];

    // Panel
    this._gfx.fillStyle(0x060a14, 0.97);
    this._gfx.lineStyle(1, 0x3a3a5e, 1);
    this._gfx.strokeRoundedRect(px, py, panelW, panelH, 6);
    this._gfx.fillRoundedRect(px, py, panelW, panelH, 6);
    this._gfx.fillStyle(Hex2Int(player ? player.color : '#4af0c0'), 0.4);
    this._gfx.fillRoundedRect(px, py, panelW, 3, { tl: 6, tr: 6, bl: 0, br: 0 });

    // Tabs
    this._tabTexts.forEach((txt, i) => {
      txt.setColor(i === this._tab ? '#4af0c0' : '#8888a0');
      txt.setFontStyle(i === this._tab ? 'bold' : 'normal');
      if (i === this._tab) {
        this._gfx.fillStyle(0x4af0c0, 0.8);
        this._gfx.fillRect(px + 10 + i * (panelW / tabs.length) + 10, py + 36, panelW / tabs.length - 20, 2);
      }
    });

    const contentY = py + 50;
    if (!player) return;

    switch (this._tab) {
      case 0: this._renderStats(contentY); break;
      case 1: this._renderAbilities(contentY); break;
      case 2: this._renderItems(contentY); break;
      case 3: this._renderKnowledge(contentY); break;
    }
  }

  _addTxt(x, y, text, style) {
    const t = this.add.text(x, y, text, style).setDepth(402);
    this._contentTexts.push(t);
    return t;
  }

  _renderStats(contentY) {
    const { px, panelW, _player: player } = this;
    const p = player;

    // Portrait
    const portraitKey = 'portrait-' + p.portrait;
    if (this.textures.exists(portraitKey)) {
      const img = this.add.image(px + 60, contentY + 50, portraitKey).setDisplaySize(80, 80).setDepth(402);
      const mask = this.make.graphics({ add: false });
      mask.fillStyle(0xffffff, 1);
      mask.fillCircle(px + 60, contentY + 50, 42);
      img.setMask(mask.createGeometryMask());
      this._contentTexts.push(img);
    } else {
      this._contentGfx.fillStyle(Hex2Int(p.color), 0.3);
      this._contentGfx.fillCircle(px + 60, contentY + 50, 40);
    }

    this._addTxt(px + 120, contentY + 18, p.name, { fontFamily: "'Cormorant Garamond', serif", fontSize: '24px', fontStyle: 'bold', color: p.color });
    this._addTxt(px + 120, contentY + 46, p.title, { fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#8888a0' });
    this._addTxt(px + 120, contentY + 66, `Level ${p.level}  |  ${p.xp}/${p.xpToNext} XP`, { fontFamily: "'Inter', sans-serif", fontSize: '13px', color: '#e8e8ec' });
    // XP bar
    drawBar(this._contentGfx, px + 120, contentY + 84, panelW - 140, 10, p.xp, p.xpToNext, 0xEAB308, 0x1a1400);

    this._addTxt(px + panelW - 16, contentY + 14, `${p.gold}g`, { fontFamily: "'Inter', sans-serif", fontSize: '18px', fontStyle: 'bold', color: '#EAB308' }).setOrigin(1, 0);
    this._addTxt(px + panelW - 16, contentY + 36, `◆ ${p.cognitiveFragments.length}/14`, { fontFamily: "'Inter', sans-serif", fontSize: '13px', color: '#4af0c0' }).setOrigin(1, 0);
    this._addTxt(px + panelW - 16, contentY + 54, `📚 ${p.totalInsightsRead}/44 insights`, { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#8888a0' }).setOrigin(1, 0);

    const stats = [
      ['HP', p.hp, p.maxHp, 0x4af0c0],
      ['MP', p.mp, p.maxMp, 0x6366f1],
      ['ATK', p.atk, 50, 0xff4466],
      ['DEF', p.def, 50, 0x3B82F6],
      ['SPD', p.spd, 30, 0xF59E0B],
      ['INT', p.int, 50, 0xA855F7]
    ];

    const statsY = contentY + 116;
    stats.forEach(([label, val, max, color], i) => {
      const sy = statsY + i * 32;
      this._addTxt(px + 20, sy + 4, label, { fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: 'bold', color: '#8888a0' });
      drawBar(this._contentGfx, px + 58, sy, panelW * 0.45, 16, val, max, color, 0x1a1a2e);
      this._addTxt(px + 68 + panelW * 0.45, sy + 2, `${Math.floor(val)}`, { fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: 'bold', color: '#e8e8ec' });
    });

    // Equipment
    const eqY = statsY + stats.length * 32 + 10;
    this._addTxt(px + 20, eqY, 'Equipment:', { fontFamily: "'Inter', sans-serif", fontSize: '14px', fontStyle: 'bold', color: '#e8e8ec' });
    if (p.equipment.length === 0) {
      this._addTxt(px + 20, eqY + 20, 'None', { fontFamily: "'Inter', sans-serif", fontSize: '13px', color: '#555' });
    } else {
      p.equipment.forEach((eqId, i) => {
        const eq = EQUIPMENT.find(e => e.id === eqId);
        if (eq) this._addTxt(px + 20, eqY + 20 + i * 18, `${eq.name} — ${eq.desc}`, { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#c8c8d0' });
      });
    }
  }

  _renderAbilities(contentY) {
    const { px, panelW, _player: player } = this;
    if (player.abilities.length === 0) {
      this._addTxt(px + 20, contentY + 20, 'No abilities unlocked yet.', { fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#555' });
      this._addTxt(px + 20, contentY + 44, 'Read all insights in a town to unlock its special ability.', { fontFamily: "'Inter', sans-serif", fontSize: '13px', color: '#555' });
      return;
    }
    player.abilities.forEach((abId, i) => {
      const ab = ABILITIES[abId];
      if (!ab) return;
      const ay = contentY + 12 + i * 58;
      this._contentGfx.fillStyle(0x1a1a2e, 0.6);
      this._contentGfx.fillRoundedRect(px + 12, ay - 4, panelW - 24, 50, 4);
      this._addTxt(px + 20, ay + 4, ab.name, { fontFamily: "'Cormorant Garamond', serif", fontSize: '18px', fontStyle: 'bold', color: '#4af0c0' });
      this._addTxt(px + 20, ay + 24, `${ab.cost} MP  —  ${ab.desc}`, { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#8888a0' });
      this._addTxt(px + panelW - 20, ay + 4, ab.type.toUpperCase(), {
        fontFamily: "'Inter', sans-serif", fontSize: '11px', fontStyle: 'bold',
        color: ab.type === 'damage' ? '#ff4466' : ab.type === 'heal' ? '#4af0c0' : ab.type === 'buff' ? '#EAB308' : '#A855F7'
      }).setOrigin(1, 0);
    });
  }

  _renderItems(contentY) {
    const { px, panelW, _player: player } = this;
    const usable = player.items.filter(i => i.qty > 0);
    if (usable.length === 0) {
      this._addTxt(px + 20, contentY + 20, 'No items in your inventory.', { fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#555' });
      return;
    }
    usable.forEach((item, i) => {
      const data = ITEMS[item.id];
      if (!data) return;
      const iy = contentY + 12 + i * 40;
      this._addTxt(px + 20, iy, `${data.name}  x${item.qty}`, { fontFamily: "'Inter', sans-serif", fontSize: '14px', fontStyle: 'bold', color: '#e8e8ec' });
      this._addTxt(px + 20, iy + 20, data.desc, { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#8888a0' });
    });
  }

  _renderKnowledge(contentY) {
    const { px, panelW, _player: player } = this;
    let y = contentY + 8;
    Object.keys(INDUSTRIES).forEach(key => {
      const ind = INDUSTRIES[key];
      const read = player.insightsByIndustry[key] || [];
      const total = ind.insights.length;
      const complete = read.length >= total;
      const hasFragment = player.cognitiveFragments.includes(key);
      const indColor = ind.color;

      this._contentGfx.fillStyle(Hex2Int(indColor), complete ? 0.15 : 0.05);
      this._contentGfx.fillRoundedRect(px + 10, y - 2, panelW - 20, 24, 3);

      this._addTxt(px + 18, y + 4, `${hasFragment ? '◆' : '◇'} ${ind.name}`, {
        fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: complete ? 'bold' : 'normal',
        color: complete ? indColor : '#8888a0'
      });
      this._addTxt(px + panelW - 20, y + 4, `${read.length}/${total}`, {
        fontFamily: "'Inter', sans-serif", fontSize: '12px', color: complete ? indColor : '#555566'
      }).setOrigin(1, 0);
      drawBar(this._contentGfx, px + panelW / 2, y + 6, panelW * 0.3, 8, read.length, total, Hex2Int(indColor), 0x1a1a2e);
      y += 28;
    });
  }

  _close() {
    Audio.uiClick();
    this._contentTexts.forEach(t => t.destroy());
    this.scene.stop();
    if (this._parentScene) this.scene.resume(this._parentScene);
  }

  update() {
    if (Phaser.Input.Keyboard.JustDown(this._escKey) || Phaser.Input.Keyboard.JustDown(this._iKey)) this._close();
    if (Phaser.Input.Keyboard.JustDown(this._leftKey)) {
      this._tab = (this._tab - 1 + 4) % 4;
      Audio.uiClick();
      this._refresh();
    }
    if (Phaser.Input.Keyboard.JustDown(this._rightKey)) {
      this._tab = (this._tab + 1) % 4;
      Audio.uiClick();
      this._refresh();
    }
  }
}

/* ==========================================================================
   PHASER GAME CONFIGURATION & LAUNCH
   ========================================================================== */
// Update loading bar as images load
(function setupLoadingBar() {
  const images = [
    'img-title', 'img-battle-digital', 'img-battle-corporate',
    'img-battle-knowledge', 'img-battle-power',
    'portrait-alex-chen', 'portrait-maya-torres', 'portrait-james-wright',
    'portrait-zara-kim', 'portrait-kai-rhythm', 'portrait-diana-price',
    'portrait-marcus-gold', 'portrait-sarah-lane', 'portrait-ravi-patel',
    'portrait-victoria-chase', 'portrait-tom-realty', 'portrait-jade-spark',
    'portrait-commander-hayes', 'portrait-ada-future',
    // Kenney key assets for loading bar tracking
    'kt-grass_center', 'kt-water_center', 'kt-tree_single', 'kt-building_door',
    'kt-castle_wall', 'kt-rocks_grass', 'kc-Male_0_Idle0', 'kc-Male_0_Run0'
  ];
  let loaded = 0;
  const bar = document.getElementById('load-bar-fill');
  const status = document.getElementById('load-status');

  function onLoad() {
    loaded++;
    const pct = Math.floor((loaded / images.length) * 80);
    if (bar) bar.style.width = pct + '%';
    if (status) status.textContent = `Loading assets... ${loaded}/${images.length}`;
  }

  images.forEach(id => {
    const el = document.getElementById(id);
    if (!el) { onLoad(); return; }
    if (el.complete && el.naturalWidth > 0) { onLoad(); return; }
    el.onload = onLoad;
    el.onerror = onLoad;
  });
})();

function startPhaser() {
  const gameConfig = {
    type: Phaser.AUTO,
    width: 1024,
    height: 768,
    backgroundColor: '#0a0e1a',
    parent: 'game-container',
    scene: [
      BootScene,
      PreloadScene,
      TitleScene,
      CharSelectScene,
      TownScene,
      OverworldScene,
      BattleScene,
      DialogScene,
      InsightScene,
      ShopScene,
      InventoryScene
    ],
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      min: { width: 640, height: 480 },
      max: { width: 1920, height: 1080 }
    },
    render: {
      antialias: true,
      pixelArt: false,
      roundPixels: false
    }
  };

  // Initialize audio system on first interaction
  document.addEventListener('click', () => {
    Audio.init();
    Audio.resume();
  }, { once: true });
  document.addEventListener('keydown', () => {
    Audio.init();
    Audio.resume();
  }, { once: true });

  const game = new Phaser.Game(gameConfig);
  window.__GAME__ = game;
  return game;
}

// Wait for fonts + Phaser to load, then start
document.fonts.ready.then(() => {
  if (typeof Phaser !== 'undefined') {
    startPhaser();
  } else {
    // Fallback: wait for Phaser script
    const checkPhaser = setInterval(() => {
      if (typeof Phaser !== 'undefined') {
        clearInterval(checkPhaser);
        startPhaser();
      }
    }, 100);
  }
});
