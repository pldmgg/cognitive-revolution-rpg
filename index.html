<script>
// Animate loading bar while assets load
(function() {
  const fill = document.getElementById('load-bar-fill');
  const status = document.getElementById('load-status');
  let progress = 0;
  const messages = ['Loading game engine...', 'Preparing characters...', 'Building world...', 'Almost ready...'];
  let msgIdx = 0;
  const interval = setInterval(() => {
    progress = Math.min(95, progress + (Math.random() * 8 + 2));
    fill.style.width = progress + '%';
    if (Math.floor(progress / 25) > msgIdx) {
      msgIdx = Math.floor(progress / 25);
      if (messages[msgIdx]) status.textContent = messages[msgIdx];
    }
  }, 180);
  // Stop when Phaser is ready
  window._stopLoadAnim = function() {
    clearInterval(interval);
    fill.style.width = '100%';
    status.textContent = 'Ready!';
  };
})();
</script>

<script>
/* ==========================================================================
   UTILITY HELPERS
   ========================================================================== */
const Hex2Int = c => parseInt(c.replace('#',''), 16);
const IntHex = n => '#' + n.toString(16).padStart(6, '0');

// Draw a colored bar on a Phaser Graphics object
function drawBar(gfx, x, y, w, h, val, max, color, bgColor) {
  const pct = Math.max(0, Math.min(1, val / max));
  gfx.fillStyle(bgColor || 0x1a1a2e, 1);
  gfx.fillRect(x, y, w, h);
  gfx.fillStyle(color, 1);
  gfx.fillRect(x, y, Math.floor(w * pct), h);
  gfx.fillStyle(0xffffff, 0.08);
  gfx.fillRect(x, y, w, Math.ceil(h / 3));
}

// Isometric coordinate helpers
const ISO_TW = 64, ISO_TH = 32;

function tileToScreen(tx, ty, offsetX, offsetY) {
  return {
    x: (tx - ty) * (ISO_TW / 2) + offsetX,
    y: (tx + ty) * (ISO_TH / 2) + offsetY
  };
}

/* ==========================================================================
   PRELOAD SCENE
   ========================================================================== */
class PreloadScene extends Phaser.Scene {
  constructor() { super({ key: 'Preload' }); }

  create() {
    // Register portrait textures from pre-loaded <img> elements
    const portraits = [
      'alex-chen','maya-torres','james-wright','zara-kim','kai-rhythm',
      'diana-price','marcus-gold','sarah-lane','ravi-patel','victoria-chase',
      'tom-realty','jade-spark','commander-hayes','ada-future'
    ];
    portraits.forEach(name => {
      const el = document.getElementById('portrait-' + name);
      if (el && el.complete && el.naturalWidth > 0) {
        const texture = this.textures.createCanvas('portrait-' + name, el.naturalWidth, el.naturalHeight);
        const ctx = texture.getContext();
        ctx.drawImage(el, 0, 0);
        texture.refresh();
      }
    });

    // Register battle backgrounds from <img> elements
    ['digital','corporate','knowledge','power'].forEach(key => {
      const el = document.getElementById('img-battle-' + key);
      if (el && el.complete && el.naturalWidth > 0) {
        const texture = this.textures.createCanvas('battle-bg-' + key, el.naturalWidth, el.naturalHeight);
        const ctx = texture.getContext();
        ctx.drawImage(el, 0, 0);
        texture.refresh();
      }
    });

    // Title screen
    const titleEl = document.getElementById('img-title');
    if (titleEl && titleEl.complete && titleEl.naturalWidth > 0) {
      const texture = this.textures.createCanvas('title-screen', titleEl.naturalWidth, titleEl.naturalHeight);
      const ctx = texture.getContext();
      ctx.drawImage(titleEl, 0, 0);
      texture.refresh();
    }

    // Register Kenney tile textures from hidden <img> tags
    const scene = this;
    const registerImg = (id, texName) => {
      const el = document.getElementById(id);
      if (el && el.complete && el.naturalWidth > 0) {
        try {
          const tex = scene.textures.createCanvas(texName, el.naturalWidth, el.naturalHeight);
          const c = tex.getContext();
          c.drawImage(el, 0, 0);
          tex.refresh();
        } catch(e) { /* texture may already exist */ }
      }
    };

    // Collect all Kenney img IDs and their texture names
    const kenneyAssets = [];
    const townTiles = [
      'grass_center','grass_path','grass_pathBend','grass_pathCrossing',
      'water_center','grass_water','castle_wall','castle_tower',
      'tree_single','tree_multiple','tree_pine','tree_pineLarge',
      'rocks_grass','dirt_center','bridge','building_door','building_doorBeige',
      'building_doorWindows','building_doorWindowsBeige','building_windows',
      'roof_gableGreen','roof_gableBrown','roof_gablePurple','roof_gableBeige',
      'roof_roundGreen','roof_pointBeige','well','fence_wood',
      'grass_slope','cliff','grass_river','grass_block','structure_arch','furrow_crop'
    ];
    townTiles.forEach(t => kenneyAssets.push({ id: 'kt-' + t, tex: 'kt-' + t }));
    ['dirt_center','grass_center','grass_path'].forEach(t => kenneyAssets.push({ id: 'kd-' + t, tex: 'kd-' + t }));
    ['stone','stoneTile','stoneWall','barrel','chestClosed','woodenCrate','planks'].forEach(t => kenneyAssets.push({ id: 'kdu-' + t, tex: 'kdu-' + t }));
    for (let v = 0; v <= 7; v++) {
      kenneyAssets.push({ id: 'kc-Male_' + v + '_Idle0', tex: 'char-' + v + '-idle' });
      const runCount = v === 0 ? 10 : 4;
      for (let f = 0; f < runCount; f++) {
        kenneyAssets.push({ id: 'kc-Male_' + v + '_Run' + f, tex: 'char-' + v + '-run' + f });
      }
    }

    // Wait for all Kenney images to load, then register textures
    const waitForImages = () => {
      return new Promise(resolve => {
        const allImgs = kenneyAssets.map(a => document.getElementById(a.id)).filter(Boolean);
        let pending = 0;
        allImgs.forEach(el => {
          if (!el.complete) pending++;
        });
        if (pending === 0) { resolve(); return; }
        let resolved = false;
        const check = () => {
          if (resolved) return;
          const stillPending = allImgs.filter(el => !el.complete).length;
          if (stillPending === 0) { resolved = true; resolve(); }
        };
        allImgs.forEach(el => {
          el.addEventListener('load', check);
          el.addEventListener('error', check);
        });
        // Timeout fallback: proceed after 3s even if not all loaded
        setTimeout(() => { if (!resolved) { resolved = true; resolve(); } }, 3000);
      });
    };

    waitForImages().then(() => {
      kenneyAssets.forEach(a => registerImg(a.id, a.tex));

      // Store player reference in registry
      scene.registry.set('player', null);
      scene.registry.set('currentTown', null);

      // Update loading overlay to done
      if (typeof window._stopLoadAnim === 'function') window._stopLoadAnim();

      // Short delay then go to title
      scene.time.delayedCall(400, () => {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.classList.add('hidden');
        scene.scene.start('Title');
      });
    });
  }
}

/* ==========================================================================
   TITLE SCENE
   ========================================================================== */
class TitleScene extends Phaser.Scene {
  constructor() { super({ key: 'Title' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    // Background
    if (this.textures.exists('title-screen')) {
      const bg = this.add.image(W/2, H/2, 'title-screen');
      bg.setDisplaySize(W, H);
      // Dark overlay
      const overlay = this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 0.6);
    } else {
      this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 1);
      // Animated particles
      const g = this.add.graphics();
      this._particles = [];
      for (let i = 0; i < 60; i++) {
        this._particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 0.3 + 0.1,
          color: [0x4af0c0, 0x3B82F6, 0x8B5CF6, 0xEAB308][Math.floor(Math.random() * 4)]
        });
      }
      this._particleGfx = g;
    }

    // Vignette — drawn using canvas gradient texture
    if (this.textures.exists('__vignette__')) this.textures.remove('__vignette__');
    const vigCanvas = this.textures.createCanvas('__vignette__', W, H);
    const vigCtx = vigCanvas.getContext();
    const grad = vigCtx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.75)');
    vigCtx.fillStyle = grad;
    vigCtx.fillRect(0, 0, W, H);
    vigCanvas.refresh();
    this.add.image(W/2, H/2, '__vignette__').setDepth(5);

    // Title text
    const titleStyle = {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '64px',
      fontStyle: 'bold',
      color: '#4af0c0',
      shadow: { color: '#4af0c0', blur: 30, fill: true }
    };
    this.add.text(W/2, H * 0.22, 'THE COGNITIVE', { ...titleStyle, fontSize: '56px' }).setOrigin(0.5);
    this.add.text(W/2, H * 0.32, 'REVOLUTION', { ...titleStyle, fontSize: '72px' }).setOrigin(0.5);
    this.add.text(W/2, H * 0.41, 'An Interactive AI Industry Journey', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '18px', color: '#8888a0'
    }).setOrigin(0.5);

    // New Game button
    const btnW = 220, btnH = 52;
    const btnX = W/2 - btnW/2, btnY = H * 0.58 - btnH/2;
    const btnBg = this.add.graphics();
    btnBg.fillStyle(0x4af0c0, 0.15);
    btnBg.lineStyle(2, 0x4af0c0, 0.8);
    btnBg.strokeRect(btnX, btnY, btnW, btnH);
    btnBg.fillRect(btnX, btnY, btnW, btnH);

    const btnText = this.add.text(W/2, H * 0.58, 'NEW GAME', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '20px', fontStyle: 'bold',
      color: '#4af0c0',
      shadow: { color: '#4af0c0', blur: 10, fill: true }
    }).setOrigin(0.5);

    // Interactive area
    const btn = this.add.zone(W/2, H * 0.58, btnW, btnH).setInteractive({ cursor: 'pointer' });
    btn.on('pointerover', () => {
      btnBg.clear();
      btnBg.fillStyle(0x4af0c0, 0.25);
      btnBg.lineStyle(2, 0x4af0c0, 1);
      btnBg.strokeRect(btnX, btnY, btnW, btnH);
      btnBg.fillRect(btnX, btnY, btnW, btnH);
      btnText.setColor('#ffffff');
    });
    btn.on('pointerout', () => {
      btnBg.clear();
      btnBg.fillStyle(0x4af0c0, 0.15);
      btnBg.lineStyle(2, 0x4af0c0, 0.8);
      btnBg.strokeRect(btnX, btnY, btnW, btnH);
      btnBg.fillRect(btnX, btnY, btnW, btnH);
      btnText.setColor('#4af0c0');
    });
    btn.on('pointerdown', () => {
      Audio.init(); Audio.resume(); Audio.menuSelect();
      this.cameras.main.fadeOut(400, 10, 14, 26);
      this.cameras.main.once('camerafadeoutcomplete', () => {
        this.scene.start('CharSelect');
      });
    });

    // Keyboard
    this.input.keyboard.on('keydown-ENTER', () => {
      Audio.init(); Audio.resume(); Audio.menuSelect();
      this.cameras.main.fadeOut(400, 10, 14, 26);
      this.cameras.main.once('camerafadeoutcomplete', () => { this.scene.start('CharSelect'); });
    });

    // Controls hint
    this.add.text(W/2, H * 0.78, 'Arrow Keys: Move  |  E / Space: Interact  |  I: Inventory', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '13px', color: '#555566', alpha: 0.6
    }).setOrigin(0.5);

    // Version
    this.add.text(W/2, H * 0.93, 'v3.0 — Phaser 3 Edition', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '11px', color: '#444'
    }).setOrigin(0.5);

    // Blink animation on button
    this.tweens.add({
      targets: btnText,
      alpha: { from: 0.7, to: 1 },
      duration: 800,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });

    this.cameras.main.fadeIn(500, 10, 14, 26);
  }

  update(time) {
    if (this._particleGfx && this._particles) {
      this._particleGfx.clear();
      this._particles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) { p.y = this.scale.height; p.x = Math.random() * this.scale.width; }
        this._particleGfx.fillStyle(p.color, 0.6);
        this._particleGfx.fillCircle(p.x, p.y, p.r);
      });
    }
  }
}

/* ==========================================================================
   CHARACTER SELECT SCENE
   ========================================================================== */
class CharSelectScene extends Phaser.Scene {
  constructor() { super({ key: 'CharSelect' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this._selected = null;
    this._cards = [];

    // Background
    this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 1);

    // Title
    this.add.text(W/2, 36, 'Choose Your Character', {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '36px', fontStyle: 'bold',
      color: '#4af0c0',
      shadow: { color: '#4af0c0', blur: 20, fill: true }
    }).setOrigin(0.5, 0.5);

    this.add.text(W/2, 68, 'Each character represents an AI-transformed industry. Your starting town and abilities reflect your choice.',{
      fontFamily: "'Inter', sans-serif",
      fontSize: '13px', color: '#8888a0'
    }).setOrigin(0.5, 0.5);

    // Character grid
    const keys = Object.keys(CHARACTER_DATA);
    const cols = 7, rows = Math.ceil(keys.length / cols);
    const cardW = Math.floor((W - 40) / cols) - 6;
    const cardH = 200;
    const totalW = cols * (cardW + 6) - 6;
    const startX = (W - totalW) / 2;
    const startY = 90;

    keys.forEach((key, idx) => {
      const char = CHARACTER_DATA[key];
      const ind = INDUSTRIES[key];
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const cx = startX + col * (cardW + 6);
      const cy = startY + row * (cardH + 8);

      // Card container
      const container = this.add.container(cx + cardW/2, cy + cardH/2);
      const indColor = Hex2Int(char.color);

      // Card BG
      const cardBg = this.add.graphics();
      cardBg.fillStyle(0x12152a, 0.95);
      cardBg.lineStyle(1, 0x2a2a4a, 1);
      cardBg.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
      cardBg.fillRect(-cardW/2, -cardH/2, cardW, cardH);
      // Color accent bar on top
      cardBg.fillStyle(indColor, 0.8);
      cardBg.fillRect(-cardW/2, -cardH/2, cardW, 3);
      container.add(cardBg);

      // Portrait image or fallback
      const portraitKey = 'portrait-' + char.portrait;
      if (this.textures.exists(portraitKey)) {
        const portrait = this.add.image(0, -cardH/2 + 44, portraitKey)
          .setDisplaySize(70, 70)
          .setOrigin(0.5, 0.5);
        container.add(portrait);
        // Circular clip via mask
        const mask = this.add.graphics();
        mask.fillStyle(0xffffff, 1);
        mask.fillCircle(cx + cardW/2, cy + cardH/2 - cardH/2 + 44, 36);
        portrait.setMask(mask.createGeometryMask());
      } else {
        // Fallback: colored circle
        const circle = this.add.graphics();
        circle.fillStyle(indColor, 0.25);
        circle.fillCircle(0, -cardH/2 + 44, 32);
        circle.fillStyle(indColor, 0.9);
        circle.fillCircle(0, -cardH/2 + 30, 10);
        circle.fillRect(-6, -cardH/2 + 42, 12, 16);
        container.add(circle);
      }

      // Name
      container.add(this.add.text(0, -cardH/2 + 90, char.name, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '12px', fontStyle: 'bold',
        color: '#ffffff'
      }).setOrigin(0.5, 0.5));

      // Title/class
      container.add(this.add.text(0, -cardH/2 + 106, char.title, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '10px',
        color: char.color
      }).setOrigin(0.5, 0.5));

      // Industry
      container.add(this.add.text(0, -cardH/2 + 120, ind ? ind.name.split('/')[0].trim() : key, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '9px', color: '#8888a0'
      }).setOrigin(0.5, 0.5));

      // Mini stats
      const s = char.stats;
      const statData = [['HP', s.hp, 120], ['ATK', s.atk, 16], ['DEF', s.def, 16], ['INT', s.int, 16]];
      statData.forEach(([label, val, max], si) => {
        const sy = -cardH/2 + 136 + si * 14;
        container.add(this.add.text(-cardW/2 + 6, sy, label, {
          fontFamily: "'Inter', sans-serif",
          fontSize: '9px', color: '#666677'
        }));
        const barBg = this.add.graphics();
        barBg.fillStyle(0x222233, 1);
        barBg.fillRect(-cardW/2 + 28, sy + 1, cardW - 40, 6);
        barBg.fillStyle(indColor, 0.85);
        barBg.fillRect(-cardW/2 + 28, sy + 1, Math.floor((cardW - 40) * Math.min(1, val / max)), 6);
        container.add(barBg);
        container.add(this.add.text(cardW/2 - 4, sy, '' + val, {
          fontFamily: "'Inter', sans-serif",
          fontSize: '9px', color: '#aaaacc'
        }).setOrigin(1, 0));
      });

      // Interactive zone
      const zone = this.add.zone(cx + cardW/2, cy + cardH/2, cardW, cardH).setInteractive({ cursor: 'pointer' });
      zone.on('pointerover', () => this._hoverCard(key, cardBg, cardW, cardH, indColor));
      zone.on('pointerout', () => this._unhoverCard(key, cardBg, cardW, cardH, indColor));
      zone.on('pointerdown', () => {
        Audio.init(); Audio.resume(); Audio.uiClick();
        this._selectCard(key, cardBg, cardW, cardH, indColor);
      });

      this._cards.push({ key, cardBg, cardW, cardH, indColor });
    });

    // Start button (hidden initially)
    this._startBtnContainer = this.add.container(W/2, H - 44).setVisible(false);
    const startBg = this.add.graphics();
    startBg.fillStyle(0x4af0c0, 0.2);
    startBg.lineStyle(2, 0x4af0c0, 1);
    startBg.strokeRect(-110, -22, 220, 44);
    startBg.fillRect(-110, -22, 220, 44);
    this._startBtnContainer.add(startBg);
    this._startBtnText = this.add.text(0, 0, 'START JOURNEY', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '18px', fontStyle: 'bold',
      color: '#4af0c0'
    }).setOrigin(0.5);
    this._startBtnContainer.add(this._startBtnText);

    const startZone = this.add.zone(W/2, H - 44, 220, 44).setInteractive({ cursor: 'pointer' });
    startZone.on('pointerdown', () => { if (this._selected) this._startGame(this._selected); });
    startZone.on('pointerover', () => {
      startBg.clear();
      startBg.fillStyle(0x4af0c0, 0.35);
      startBg.lineStyle(2, 0x4af0c0, 1);
      startBg.strokeRect(-110, -22, 220, 44);
      startBg.fillRect(-110, -22, 220, 44);
    });
    startZone.on('pointerout', () => {
      startBg.clear();
      startBg.fillStyle(0x4af0c0, 0.2);
      startBg.lineStyle(2, 0x4af0c0, 1);
      startBg.strokeRect(-110, -22, 220, 44);
      startBg.fillRect(-110, -22, 220, 44);
    });

    // Selection info panel
    this._infoText = this.add.text(W/2, H - 44, 'Click a character to select', {
      fontFamily: "'Inter', sans-serif",
      fontSize: '14px', color: '#8888a0'
    }).setOrigin(0.5);

    // Enter key
    this.input.keyboard.on('keydown-ENTER', () => {
      if (this._selected) this._startGame(this._selected);
    });

    this.cameras.main.fadeIn(400, 10, 14, 26);
  }

  _hoverCard(key, cardBg, cardW, cardH, indColor) {
    if (this._selected === key) return;
    cardBg.clear();
    cardBg.fillStyle(0x16192e, 0.95);
    cardBg.lineStyle(1, indColor, 0.5);
    cardBg.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillStyle(indColor, 0.8);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, 3);
  }

  _unhoverCard(key, cardBg, cardW, cardH, indColor) {
    if (this._selected === key) return;
    cardBg.clear();
    cardBg.fillStyle(0x12152a, 0.95);
    cardBg.lineStyle(1, 0x2a2a4a, 1);
    cardBg.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillStyle(indColor, 0.8);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, 3);
  }

  _selectCard(key, cardBg, cardW, cardH, indColor) {
    // Deselect previous
    if (this._selected) {
      const prev = this._cards.find(c => c.key === this._selected);
      if (prev) this._unhoverCard(prev.key, prev.cardBg, prev.cardW, prev.cardH, prev.indColor);
    }
    this._selected = key;
    // Highlight selected
    cardBg.clear();
    cardBg.fillStyle(0x1a2040, 1);
    cardBg.lineStyle(2, indColor, 1);
    cardBg.strokeRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, cardH);
    cardBg.fillStyle(indColor, 1);
    cardBg.fillRect(-cardW/2, -cardH/2, cardW, 3);
    // Glow effect
    cardBg.lineStyle(1, indColor, 0.3);
    cardBg.strokeRect(-cardW/2 - 2, -cardH/2 - 2, cardW + 4, cardH + 4);

    // Show start button
    const char = CHARACTER_DATA[key];
    this._startBtnContainer.setVisible(true);
    this._infoText.setVisible(false);
    this._startBtnText.setText(`START AS ${char.name.split(' ')[0].toUpperCase()}`);
  }

  _startGame(industryKey) {
    Audio.mapTravel();
    const player = createNewPlayer(industryKey);
    this.registry.set('player', player);
    this.registry.set('currentTown', industryKey);

    this.cameras.main.fadeOut(500, 10, 14, 26);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start('Town', { townId: industryKey });
    });
  }
}

  [TILE.ROAD]:     { top: 0x444450, left: 0x383844, right: 0x2e2e3a }
};

// Kenney tile scale: 256px wide tiles → 64px iso tile
const TILE_SCALE = 0.25;
// Character scale: 256×512 → fit iso grid
const CHAR_SCALE = 0.11;

// Building type → [base texture, roof texture]
const BUILDING_TEX_MAP = {
  'shop':     ['kt-building_door',            'kt-roof_gableGreen'],
  'inn':      ['kt-building_doorBeige',       'kt-roof_gableBrown'],
  'weapon':   ['kt-building_doorWindows',     'kt-roof_gablePurple'],
  'archive':  ['kt-building_doorWindowsBeige', 'kt-roof_roundGreen'],
  'guardian': ['kt-well', null]
};

function drawIsoTileFallback(g, sx, sy, tileType, alpha) {
  const TW = ISO_TW, TH = ISO_TH;
  const colors = TILE_COLORS[tileType] || TILE_COLORS[TILE.STONE];
  const a = alpha !== undefined ? alpha : 1;
  g.fillStyle(colors.top, a);
  g.beginPath();
  g.moveTo(sx, sy - TH/2);
  g.lineTo(sx + TW/2, sy);
  g.lineTo(sx, sy + TH/2);
  g.lineTo(sx - TW/2, sy);
  g.closePath();
  g.fill();
}

/* ==========================================================================

class TownScene extends Phaser.Scene {
  constructor() { super({ key: 'Town' }); }

  init(data) {
    this._townId = data.townId || 'it-services';
    this._startX = data.startX !== undefined ? data.startX : 15;
    this._startY = data.startY !== undefined ? data.startY : 15;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const player = this.registry.get('player');
    const ind = INDUSTRIES[this._townId];
    const industryColor = ind ? Hex2Int(ind.color) : 0x4af0c0;

    // Generate town map
    this._mapData = generateTownMap(this._townId);
    this._player = player;

    // Player position (tile)
    this._px = this._startX;
    this._py = this._startY;
    this._renderX = this._px;
    this._renderY = this._py;
    this._moveTimer = 0;
    this._moving = false;
    this._targetX = this._px;
    this._targetY = this._py;
    this._facing = 0; // 0=down,1=up,2=left,3=right
    this._stepCount = 0;
    this._runFrame = 0;
    this._runFrameTimer = 0;

    // Camera offset
    this._camX = 0;
    this._camY = 0;
    this._camTargetX = 0;
    this._camTargetY = 0;

    // Create sprite-based tile layer — images created once, repositioned each frame
    this._tileSprites = [];
    this._objectGfx = this.add.graphics();
    this._playerGfx = this.add.graphics();
    this._uiGfx = this.add.graphics();

    // Build tile sprite pool (enough for visible area)
    // With 30x30 maps and viewport ~16x24 tiles visible, we need ~400 tile sprites
    this._tilePool = [];
    this._tilePoolIdx = 0;
    for (let i = 0; i < 500; i++) {
      const spr = this.add.image(0, 0, 'kt-grass_center').setVisible(false).setOrigin(0.5, 1).setScale(TILE_SCALE);
      spr.setDepth(0);
      this._tilePool.push(spr);
    }

    // Object sprite pool for buildings/trees etc that use Kenney tiles
    this._objSpritePool = [];
    this._objPoolIdx = 0;
    for (let i = 0; i < 80; i++) {
      const spr = this.add.image(0, 0, 'kt-grass_center').setVisible(false).setOrigin(0.5, 1).setScale(TILE_SCALE);
      this._objSpritePool.push(spr);

    // Player sprite

    let npcVariant = 1;

        const variant = npcVariant % 8;

        if (texKey) {
          const spr = this.add.image(0, 0, texKey).setOrigin(0.5, 1).setScale(CHAR_SCALE * 0.95).setDepth(10).setVisible(false);
          this._npcSprites[obj.x + ',' + obj.y] = { sprite: spr, variant };
        }
        npcVariant++;
      }
    });

    // UI text elements
    this._hudName = this.add.text(26, 18, '', {

      color: player ? player.color : '#4af0c0'
    }).setDepth(100);
    this._hudHP = this.add.text(26, 36, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#4af0c0'
    }).setDepth(100);
    this._hudMP = this.add.text(26, 52, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#6366f1'
    }).setDepth(100);
    this._hudGold = this.add.text(206, 18, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#EAB308'
    }).setDepth(100).setOrigin(1, 0);
    this._hudLoc = this.add.text(W/2, 16, ind ? ind.name : this._townId, {
      fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#8888a0'
    }).setDepth(100).setOrigin(0.5, 0);
    this._hudFrags = this.add.text(W - 16, 16, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#4af0c0'
    }).setDepth(100).setOrigin(1, 0);
    this._promptText = this.add.text(0, 0, '[E] Interact', {
      fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: 'bold',
      color: '#ffdd44',
      shadow: { color: '#000', blur: 4, fill: true }
    }).setDepth(100).setVisible(false);
    this._controlsText = this.add.text(W/2, H - 14, 'Arrow Keys: Move  |  E: Interact  |  I: Inventory  |  Esc: Menu', {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#555566', alpha: 0.5
    }).setDepth(100).setOrigin(0.5, 1);

    // Input
    this._cursors = this.input.keyboard.createCursorKeys();
    this._keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
    this._keyI = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.I);
    this._keyEsc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    this._keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this._keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this._keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
    this._keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this._keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._moveDelay = 0;

    // Interaction prompt gfx
    this._promptGfx = this.add.graphics().setDepth(99);

    // Click-to-interact: clicking on the game world triggers interaction with nearby objects
    this.input.on('pointerdown', (pointer) => {
      if (!this.scene.isActive('Town')) return;
      const interactable = this._getInteractable();
      if (interactable) {
        this._handleInteraction(interactable);
      }
    });

    // Building label text objects (positioned each frame)
    this._buildingLabels = [];
    const labelStyle = { fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#e8e8ec', shadow: { color: '#000', blur: 3, fill: true } };
    this._mapData.objects.forEach(obj => {
      let labelText = '';
      let labelColor = '#e8e8ec';
      switch (obj.type) {
        case 'shop':    labelText = '\u{1F6D2} Store';   labelColor = '#4af0c0'; break;
        case 'inn':     labelText = '\u{1F3E0} Inn';     labelColor = '#F59E0B'; break;
        case 'weapon':  labelText = '\u2694\uFE0F Weapons'; labelColor = '#ff6680'; break;
        case 'archive': labelText = '\u{1F4DA} Archive'; labelColor = '#6366f1'; break;
        case 'guardian': labelText = '\u2B1F Guardian'; labelColor = '#FFD700'; break;
        case 'exit':    labelText = '\u25B6 Exit';       labelColor = '#4af0c0'; break;
        case 'npc': if (obj.npcData) { labelText = obj.npcData.name; labelColor = obj.npcData.color || '#aaaacc'; } break;
      }
      if (labelText) {
        const t = this.add.text(0, 0, labelText, { ...labelStyle, color: labelColor })
          .setOrigin(0.5, 1).setDepth(98).setVisible(false);
        t._mapObj = obj;
        // Make building/NPC labels clickable for direct interaction
        if (['shop','inn','weapon','archive','guardian','npc','exit'].includes(obj.type)) {
          t.setInteractive({ cursor: 'pointer' })
            .on('pointerdown', () => {
              if (!this.scene.isActive('Town')) return;
              this._handleInteraction(obj);
            });
        }
        this._buildingLabels.push(t);
      }
    });

    // Overworld town labels (created per-object)
    this._townLabels = [];

    this.cameras.main.fadeIn(400, 10, 14, 26);

    // Update camera immediately
    this._updateCameraImmediate();
  }

  _updateCameraImmediate() {
    const pos = tileToScreen(this._px, this._py, 0, 0);
    this._camX = pos.x;
    this._camY = pos.y;
    this._camTargetX = this._camX;
    this._camTargetY = this._camY;
  }

  _tryMove(dx, dy) {
    const nx = this._px + dx, ny = this._py + dy;
    const map = this._mapData;
    if (nx < 0 || ny < 0 || nx >= map.width || ny >= map.height) return false;
    if (BLOCKED_TILES.has(map.tiles[ny][nx])) return false;
    // Check objects blocking
    const obj = map.objects.find(o => o.x === nx && o.y === ny);
    if (obj && ['shop', 'inn', 'weapon', 'archive', 'guardian'].includes(obj.type)) return false;
    this._targetX = nx;
    this._targetY = ny;
    this._moving = true;
    this._moveTimer = 0;
    return true;
  }

  _getInteractable() {
    const map = this._mapData;
    // Check current tile and 1-tile adjacent first
    const nearDirs = [
      [0, 0], [0, -1], [0, 1], [-1, 0], [1, 0]
    ];
    for (const [dx, dy] of nearDirs) {
      const tx = this._px + dx, ty = this._py + dy;
      const obj = map.objects.find(o => o.x === tx && o.y === ty);
      if (obj) return obj;
    }
    // Then check 2-tile radius for buildings (shops, inn, weapon, archive)
    const farDirs = [
      [-1, -1], [-1, 1], [1, -1], [1, 1],
      [0, -2], [0, 2], [-2, 0], [2, 0]
    ];
    for (const [dx, dy] of farDirs) {
      const tx = this._px + dx, ty = this._py + dy;
      const obj = map.objects.find(o => o.x === tx && o.y === ty);
      if (obj && ['shop', 'inn', 'weapon', 'archive', 'exit'].includes(obj.type)) return obj;
    }
    return null;
  }

  _getObjectAtPos() {
    return this._mapData.objects.find(o => o.x === this._px && o.y === this._py) || null;
  }

  _handleInteraction(obj) {
    const player = this._player;
    Audio.uiClick();
    switch (obj.type) {
      case 'npc':
      case 'guardian': {
        const isGuardian = obj.type === 'guardian';
        if (isGuardian) {
          const ind = INDUSTRIES[obj.industryKey];
          if (!ind) break;
          const allRead = ind.insights.every(ins => player.insightsRead.includes(ins.id));
          if (allRead && !player.cognitiveFragments.includes(obj.industryKey)) {
            player.cognitiveFragments.push(obj.industryKey);
            if (!player.completedTowns.includes(obj.industryKey)) player.completedTowns.push(obj.industryKey);
            Audio.fragmentCollect();
            this.scene.launch('Dialog', {
              name: 'Town Guardian', color: '#FFD700',
              dialogue: [...ind.guardianDialogue, '✦ Cognitive Fragment Acquired! ✦'],
              parentScene: 'Town'
            });
          } else if (allRead) {
            this.scene.launch('Dialog', {
              name: 'Town Guardian', color: '#FFD700',
              dialogue: ['You already carry this town\'s fragment. Safe travels!'],
              parentScene: 'Town'
            });
          } else {
            const remaining = ind.insights.filter(ins => !player.insightsRead.includes(ins.id)).length;
            this.scene.launch('Dialog', {
              name: 'Town Guardian', color: '#FFD700',
              dialogue: [`Still ${remaining} insight${remaining > 1 ? 's' : ''} left to read.`, 'Visit the Knowledge Archive to learn more.'],
              parentScene: 'Town'
            });
          }
        } else {
          const npc = obj.npcData;
          this.scene.launch('Dialog', {
            name: npc ? npc.name : 'Villager',
            color: npc ? npc.color : '#aaaacc',
            dialogue: npc ? npc.dialogue : ['...'],
            parentScene: 'Town'
          });
        }
        this.scene.pause('Town');
        break;
      }
      case 'knowledge': {
        const insight = this._findInsight(obj.insightId);
        if (insight && !player.insightsRead.includes(obj.insightId)) {
          Audio.insightRead();
          this.scene.launch('Insight', { insight, player, parentScene: 'Town' });
          this.scene.pause('Town');
        } else {
          this.scene.launch('Dialog', {
            name: 'Knowledge Point', color: '#4af0c0',
            dialogue: ['You have already absorbed this insight.'],
            parentScene: 'Town'
          });
          this.scene.pause('Town');
        }
        break;
      }
      case 'shop':
        this.scene.launch('Shop', { items: SHOP_GENERAL, title: 'General Store', parentScene: 'Town' });
        this.scene.pause('Town');
        break;
      case 'weapon':
        this.scene.launch('Shop', { items: SHOP_WEAPON, title: 'Weapon Shop', parentScene: 'Town' });
        this.scene.pause('Town');
        break;
      case 'inn':
        if (player.gold >= 100) {
          player.gold -= 100;
          player.hp = player.maxHp;
          player.mp = player.maxMp;
          Audio.heal();
          this.scene.launch('Dialog', {
            name: 'Innkeeper', color: '#F59E0B',
            dialogue: ['Welcome! Rest well... (-100g)', 'HP and MP fully restored!'],
            parentScene: 'Town'
          });
        } else {
          this.scene.launch('Dialog', {
            name: 'Innkeeper', color: '#F59E0B',
            dialogue: ['Rest costs 100 gold. Come back when you have enough!'],
            parentScene: 'Town'
          });
        }
        this.scene.pause('Town');
        break;
      case 'archive':
        this.scene.launch('Dialog', {
          name: 'Knowledge Archive', color: '#4af0c0',
          dialogue: ['Welcome to the Knowledge Archive.', 'Seek the glowing orbs throughout this town to learn industry insights.', 'Knowledge gives you power — literally!'],
          parentScene: 'Town'
        });
        this.scene.pause('Town');
        break;
      case 'exit':
        this._exitToOverworld();
        break;
    }
  }

  _findInsight(insightId) {
    for (const ind of Object.values(INDUSTRIES)) {
      const ins = ind.insights.find(i => i.id === insightId);
      if (ins) return ins;
    }
    return null;
  }

  _exitToOverworld() {
    Audio.mapTravel();
    this.cameras.main.fadeOut(400, 10, 14, 26);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start('Overworld');
    });
  }

  update(time, delta) {
    if (!this.scene.isActive('Town')) return;
    const dt = delta / 1000;
    const player = this._player;

    // Moving animation
    if (this._moving) {
      this._moveTimer += dt * 8; // speed
      const t = Math.min(1, this._moveTimer);
      this._renderX = this._px + (this._targetX - this._px) * t;
      this._renderY = this._py + (this._targetY - this._py) * t;
      if (this._moveTimer >= 1) {
        this._px = this._targetX;
        this._py = this._targetY;
        this._renderX = this._px;
        this._renderY = this._py;
        this._moving = false;

        // Check step-on triggers — exit when reaching edge of town (within 2 tiles of wall)
        const atObj = this._getObjectAtPos();
        if (atObj && atObj.type === 'exit') {
          this._exitToOverworld();
        } else {
          const map = this._mapData;
          const nearEdge = this._px <= 2 || this._px >= map.width - 3 || this._py <= 2 || this._py >= map.height - 3;
          if (nearEdge) {
            this._exitToOverworld();
          }
        }
      }
    }

    // Camera lerp
    const W = this.scale.width, H = this.scale.height;
    const pos = tileToScreen(this._renderX, this._renderY, 0, 0);
    this._camTargetX = pos.x;
    this._camTargetY = pos.y;
    this._camX += (this._camTargetX - this._camX) * 0.1;
    this._camY += (this._camTargetY - this._camY) * 0.1;

    // Input
    this._moveDelay -= dt;
    if (!this._moving && this._moveDelay <= 0) {
      let moved = false;
      if (this._cursors.up.isDown || this._keyW.isDown) {
        moved = this._tryMove(-1, -1); this._facing = 1;
      } else if (this._cursors.down.isDown || this._keyS.isDown) {
        moved = this._tryMove(1, 1); this._facing = 0;
      } else if (this._cursors.left.isDown || this._keyA.isDown) {
        moved = this._tryMove(-1, 1); this._facing = 2;
      } else if (this._cursors.right.isDown || this._keyD.isDown) {
        moved = this._tryMove(1, -1); this._facing = 3;
      }
      if (moved) {
        this._moveDelay = 0.08;
        this._stepCount++;
        if (this._stepCount % 3 === 0) Audio.footstep();
      }
    }

    // Interaction
    if (Phaser.Input.Keyboard.JustDown(this._keyE) || Phaser.Input.Keyboard.JustDown(this._keySpace)) {
      const interactable = this._getInteractable();
      if (interactable) this._handleInteraction(interactable);
    }

    // Inventory
    if (Phaser.Input.Keyboard.JustDown(this._keyI)) {
      Audio.uiClick();
      this.scene.launch('Inventory', { parentScene: 'Town' });
      this.scene.pause('Town');
    }

    // Render
    this._render(time / 1000);
    this._renderHUD(player);
  }

  _render(time) {
    const W = this.scale.width, H = this.scale.height;
    const map = this._mapData;
    const player = this._player;
    const ind = INDUSTRIES[this._townId];
    const industryColor = ind ? Hex2Int(ind.color) : 0x4af0c0;
    const offX = W/2 - this._camX;
    const offY = H/3 - this._camY;

    // Clear only the overlay graphics
    this._objectGfx.clear();
    this._playerGfx.clear();
    this._promptGfx.clear();

    // Reset tile pool
    this._tilePoolIdx = 0;
    this._objPoolIdx = 0;

    // Draw ground tiles using sprite pool
    for (let ty = 0; ty < map.height; ty++) {
      for (let tx = 0; tx < map.width; tx++) {
        const screen = tileToScreen(tx, ty, offX, offY);
        if (screen.x < -80 || screen.x > W + 80 || screen.y < -80 || screen.y > H + 80) continue;
        const tileType = map.tiles[ty][tx];
        if (tileType === TILE.VOID) continue;

        // Determine ground texture (always draw grass under trees/mountains/buildings)
        let groundTex = TILE_TEX_MAP[tileType];
        const needsGround = [TILE.TREE, TILE.MOUNTAIN, TILE.BUILDING, TILE.WALL].includes(tileType);
        if (needsGround) groundTex = 'kt-grass_center';

        if (groundTex && this.textures.exists(groundTex) && this._tilePoolIdx < this._tilePool.length) {
          const spr = this._tilePool[this._tilePoolIdx++];
          spr.setTexture(groundTex);
          spr.setPosition(screen.x, screen.y + ISO_TH/2);
          spr.setScale(TILE_SCALE);
          spr.setDepth(ty + tx * 0.01);
          spr.setVisible(true);
          spr.setAlpha(1);
        } else if (!groundTex) {
          // fallback shape for void etc
          drawIsoTileFallback(this._objectGfx, screen.x, screen.y, tileType);
        }

        // Draw elevated objects (trees, walls, mountains) as extra sprite on top
        if (tileType === TILE.TREE && this._tilePoolIdx < this._tilePool.length) {
          const treeTex = (tx + ty) % 3 === 0 ? 'kt-tree_multiple' : ((tx + ty) % 3 === 1 ? 'kt-tree_pine' : 'kt-tree_single');
          if (this.textures.exists(treeTex)) {
            const spr = this._tilePool[this._tilePoolIdx++];
            spr.setTexture(treeTex);
            spr.setPosition(screen.x, screen.y + ISO_TH/2);
            spr.setScale(TILE_SCALE);
            spr.setDepth(ty + tx * 0.01 + 0.5);
            spr.setVisible(true);
            spr.setAlpha(1);
          }
        } else if (tileType === TILE.MOUNTAIN && this.textures.exists('kt-rocks_grass') && this._tilePoolIdx < this._tilePool.length) {
          const spr = this._tilePool[this._tilePoolIdx++];
          spr.setTexture((tx + ty) % 2 === 0 ? 'kt-rocks_grass' : 'kt-cliff');
          spr.setPosition(screen.x, screen.y + ISO_TH/2);
          spr.setScale(TILE_SCALE);
          spr.setDepth(ty + tx * 0.01 + 0.5);
          spr.setVisible(true);
          spr.setAlpha(1);
        } else if (tileType === TILE.WALL && this.textures.exists('kt-castle_wall') && this._tilePoolIdx < this._tilePool.length) {
          const spr = this._tilePool[this._tilePoolIdx++];
          spr.setTexture('kt-castle_wall');
          spr.setPosition(screen.x, screen.y + ISO_TH/2);
          spr.setScale(TILE_SCALE);
          spr.setDepth(ty + tx * 0.01 + 0.5);
          spr.setVisible(true);
          spr.setAlpha(1);
        }
      }
    }

    // Hide unused tile pool sprites
    for (let i = this._tilePoolIdx; i < this._tilePool.length; i++) {
      this._tilePool[i].setVisible(false);
    }

    // Draw objects and player (sorted by y for depth)
    const allDrawables = [
      ...map.objects.map(o => ({ ...o, _type: 'obj' })),
      { x: this._renderX, y: this._renderY, _type: 'player' }
    ].sort((a, b) => (a.y + a.x * 0.001) - (b.y + b.x * 0.001));

    let interactable = this._getInteractable();

    // Hide all NPC sprites first, show only visible ones
    Object.values(this._npcSprites).forEach(ns => ns.sprite.setVisible(false));

    allDrawables.forEach(drawable => {
      if (drawable._type === 'player') {
        this._drawPlayer(this._renderX, this._renderY, time);
        return;
      }
      const obj = drawable;
      const screen = tileToScreen(obj.x, obj.y, offX, offY);
      if (screen.x < -80 || screen.x > W + 80 || screen.y < -80 || screen.y > H + 80) return;

      const isInteract = interactable && interactable.x === obj.x && interactable.y === obj.y;
      if (isInteract) {
        this._promptGfx.fillStyle(0xffdd44, 0.15);
        this._promptGfx.fillCircle(screen.x, screen.y, 28);
      }

      const buildingTex = BUILDING_TEX_MAP[obj.type];
      if (buildingTex) {
        // Use Kenney building sprites
        const [baseTex, roofTex] = buildingTex;
        if (baseTex && this.textures.exists(baseTex) && this._objPoolIdx < this._objSpritePool.length) {
          const spr = this._objSpritePool[this._objPoolIdx++];
          spr.setTexture(baseTex);
          spr.setPosition(screen.x, screen.y + ISO_TH/2);
          spr.setScale(TILE_SCALE);
          spr.setDepth(obj.y + obj.x * 0.01 + 1);
          spr.setVisible(true);
          spr.setAlpha(1);
        }
        if (roofTex && this.textures.exists(roofTex) && this._objPoolIdx < this._objSpritePool.length) {
          const spr = this._objSpritePool[this._objPoolIdx++];
          spr.setTexture(roofTex);
          spr.setPosition(screen.x, screen.y + ISO_TH/2 - 48);
          spr.setScale(TILE_SCALE);
          spr.setDepth(obj.y + obj.x * 0.01 + 1.1);
          spr.setVisible(true);
          spr.setAlpha(1);
        }
      } else {
        switch (obj.type) {
          case 'knowledge': {
            const alreadyRead = player && player.insightsRead.includes(obj.insightId);
            const kPulse = alreadyRead ? 0.3 : (0.5 + Math.sin(time * 3 + obj.x) * 0.3);
            const kColor = alreadyRead ? 0x444466 : 0x4af0c0;
            this._objectGfx.fillStyle(kColor, kPulse * 0.5);
            this._objectGfx.fillCircle(screen.x, screen.y - 10, 16);
            this._objectGfx.fillStyle(kColor, kPulse);
            this._objectGfx.fillCircle(screen.x, screen.y - 10, 7);
            if (!alreadyRead) {
              this._objectGfx.lineStyle(1, kColor, kPulse * 0.6);
              this._objectGfx.strokeCircle(screen.x, screen.y - 10, 12);
            }
            break;
          }
          case 'npc': {
            const npcKey = obj.x + ',' + obj.y;
            const npcEntry = this._npcSprites[npcKey];
            if (npcEntry) {
              const bob = Math.sin(time * 1.5 + obj.x) * 1;
              npcEntry.sprite.setPosition(screen.x, screen.y + ISO_TH/2 - 6 + bob);
              npcEntry.sprite.setDepth(obj.y + obj.x * 0.01 + 1);
              npcEntry.sprite.setVisible(true);
              // Flip NPC based on position relative to player
              npcEntry.sprite.setFlipX(obj.x < this._px);
            } else {
              // Fallback: draw shape NPC
              this._drawNPCFallback(this._objectGfx, screen.x, screen.y, obj.npcData, time);
            }
            break;
          }
          case 'exit': {
            const ePulse = 0.5 + Math.sin(time * 2) * 0.3;
            this._objectGfx.fillStyle(0x4af0c0, ePulse * 0.3);
            this._objectGfx.fillRect(screen.x - 20, screen.y - 6, 40, 14);
            this._objectGfx.lineStyle(2, 0x4af0c0, ePulse);
            this._objectGfx.strokeRect(screen.x - 20, screen.y - 6, 40, 14);
            break;
          }
        }
      }
    });

    // Hide unused obj pool sprites
    for (let i = this._objPoolIdx; i < this._objSpritePool.length; i++) {
      this._objSpritePool[i].setVisible(false);
    }

    // Interaction prompt
    if (interactable) {
      const screen = tileToScreen(interactable.x, interactable.y, offX, offY);
      const promptPulse = 0.7 + Math.sin(time * 4) * 0.3;
      this._promptGfx.fillStyle(0x000000, 0.6);
      this._promptGfx.fillRoundedRect(screen.x - 22, screen.y - 52, 44, 20, 4);
      this._promptGfx.lineStyle(1, 0xffdd44, promptPulse);
      this._promptGfx.strokeRoundedRect(screen.x - 22, screen.y - 52, 44, 20, 4);
      this._promptText.setPosition(screen.x, screen.y - 42).setVisible(true);
    } else {
      this._promptText.setVisible(false);
    }

    // Update building labels
    this._updateBuildingLabels();
  }

  _drawLabel(g, x, y, label, color) {
    // Actual labels are Phaser Text objects updated in _updateBuildingLabels()
  }

  _updateBuildingLabels() {
    if (!this._buildingLabels) return;
    const W = this.scale.width, H = this.scale.height;
    for (const t of this._buildingLabels) {
      const obj = t._mapObj;
      const s = tileToScreen(obj.x, obj.y, W/2 - this._camX, H/3 - this._camY);
      // Only show if on-screen
      if (s.x > -60 && s.x < W + 60 && s.y > -60 && s.y < H + 60) {
        t.setPosition(s.x, s.y - 52).setVisible(true);
      } else {
        t.setVisible(false);
      }
    }
  }

  _drawPlayer(tx, ty, time) {
    const W = this.scale.width, H = this.scale.height;
    const screen = tileToScreen(tx, ty, W/2 - this._camX, H/3 - this._camY);
    const bob = Math.sin(time * 3) * 1;

    // Update run animation frame
    if (this._moving) {
      this._runFrameTimer += 0.016;
      if (this._runFrameTimer > 0.08) {
        this._runFrameTimer = 0;
        this._runFrame = (this._runFrame + 1) % 10;
      }
      const runTex = 'char-0-run' + this._runFrame;
      if (this.textures.exists(runTex)) {
        this._playerSprite.setTexture(runTex);
      }
    } else {
      this._runFrame = 0;
      if (this.textures.exists('char-0-idle')) {
        this._playerSprite.setTexture('char-0-idle');
      }
    }

    this._playerSprite.setPosition(screen.x, screen.y + ISO_TH/2 - 6 + bob);
    this._playerSprite.setDepth(ty + tx * 0.01 + 1);
    this._playerSprite.setVisible(true);
    // Flip based on facing direction
    this._playerSprite.setFlipX(this._facing === 2 || this._facing === 1);

    // Draw shadow using graphics
    this._playerGfx.fillStyle(0x000000, 0.25);
    this._playerGfx.fillEllipse(screen.x, screen.y + 14, 22, 8);
  }

  _drawNPCFallback(g, sx, sy, npc, time) {
    const color = npc ? Hex2Int(npc.color || '#8888a0') : 0x8888a0;
    const bob = Math.sin(time * 1.5 + sx) * 1;
    g.fillStyle(0x000000, 0.2);
    g.fillEllipse(sx, sy + 12, 20, 6);
    g.fillStyle(color, 0.8);
    g.fillRect(sx - 6, sy - 12 + bob, 12, 16);
    g.fillStyle(0xe8c8a0, 1);
    g.fillCircle(sx, sy - 18 + bob, 7);
  }

  _renderHUD(player) {
    if (!player) return;
    const W = this.scale.width;
    const H = this.scale.height;

    // Update HUD text
    this._hudName.setText(`${player.name}  Lv.${player.level}`);
    this._hudName.setColor(player.color);
    this._hudHP.setText(`HP: ${Math.ceil(player.hp)} / ${player.maxHp}`);
    this._hudMP.setText(`MP: ${Math.ceil(player.mp)} / ${player.maxMp}`);
    this._hudGold.setText(`${player.gold}g`);
    this._hudFrags.setText(`◆ ${player.cognitiveFragments.length}/14`);

    // Draw HP/MP bars
    this._uiGfx.clear();
    // HUD background
    this._uiGfx.fillStyle(0x0a0e1a, 0.85);
    this._uiGfx.lineStyle(1, 0x2a2a4a, 1);
    this._uiGfx.strokeRect(8, 8, 220, 70);
    this._uiGfx.fillRect(8, 8, 220, 70);
    this._uiGfx.fillStyle(Hex2Int(player.color), 0.15);
    this._uiGfx.fillRect(8, 8, 220, 4);

    // HP bar
    drawBar(this._uiGfx, 20, 44, 190, 10, player.hp, player.maxHp, 0x4af0c0, 0x0a2020);
    // MP bar
    drawBar(this._uiGfx, 20, 58, 190, 10, player.mp, player.maxMp, 0x6366f1, 0x0a0a20);

    // Minimap (bottom-right)
    const map = this._mapData;
    const mmSize = 90;
    const mmX = W - mmSize - 12;
    const mmY = H - mmSize - 28;
    const cellW = mmSize / map.width;
    const cellH = mmSize / map.height;

    // Background
    this._uiGfx.fillStyle(0x0a0e1a, 0.85);
    this._uiGfx.fillRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);
    this._uiGfx.lineStyle(1, 0x2a2a4a, 1);
    this._uiGfx.strokeRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);

    // Draw terrain
    for (let ty = 0; ty < map.height; ty++) {
      for (let tx = 0; tx < map.width; tx++) {
        const tile = map.tiles[ty][tx];
        let color = 0x1a1a2e;
        if (tile === TILE.COBBLE || tile === TILE.ROAD) color = 0x444466;
        else if (tile === TILE.GRASS) color = 0x1a3a1a;
        else if (tile === TILE.WATER) color = 0x1a2a4a;
        else if (tile === TILE.WALL) color = 0x2a2a3a;
        else if (tile === TILE.STONE) color = 0x222233;
        this._uiGfx.fillStyle(color, 0.8);
        this._uiGfx.fillRect(mmX + tx * cellW, mmY + ty * cellH, cellW + 0.5, cellH + 0.5);
      }
    }

    // Draw objects on minimap
    map.objects.forEach(obj => {
      let dotColor = 0;
      switch (obj.type) {
        case 'shop':     dotColor = 0x4af0c0; break;
        case 'inn':      dotColor = 0xF59E0B; break;
        case 'weapon':   dotColor = 0xff4466; break;
        case 'archive':  dotColor = 0x6366f1; break;
        case 'exit':     dotColor = 0x00ff88; break;
        case 'npc':      dotColor = 0xaaaacc; break;
        case 'guardian': dotColor = 0xFFD700; break;
        case 'knowledge': dotColor = 0x4af0c0; break;
        default: return;
      }
      this._uiGfx.fillStyle(dotColor, 0.9);
      const dotSize = ['shop','inn','weapon','archive','exit'].includes(obj.type) ? 3 : 2;
      this._uiGfx.fillRect(mmX + obj.x * cellW - dotSize/2, mmY + obj.y * cellH - dotSize/2, dotSize, dotSize);
    });

    // Player dot (blinking)
    const blink = Math.sin(Date.now() / 200) > 0;
    if (blink) {
      this._uiGfx.fillStyle(0xffffff, 1);
      this._uiGfx.fillRect(mmX + this._px * cellW - 2, mmY + this._py * cellH - 2, 4, 4);
    }
    this._uiGfx.fillStyle(Hex2Int(player.color), 0.8);
    this._uiGfx.fillRect(mmX + this._px * cellW - 1.5, mmY + this._py * cellH - 1.5, 3, 3);
  }
}

/* ==========================================================================
   OVERWORLD SCENE
   ========================================================================== */
class OverworldScene extends Phaser.Scene {
  constructor() { super({ key: 'Overworld' }); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const player = this.registry.get('player');

    this._mapData = OVERWORLD_MAP;
    this._player = player;

    // Start near player's current town
    const startTown = player ? player.currentTown : 'it-services';
    const townPos = this._mapData.townPositions[startTown] || { x: 30, y: 30 };
    this._px = townPos.x;
    this._py = townPos.y + 1;
    this._renderX = this._px;
    this._renderY = this._py;
    this._targetX = this._px;
    this._targetY = this._py;
    this._moving = false;
    this._moveTimer = 0;
    this._moveDelay = 0;
    this._encounterCooldown = 3;
    this._showEncounterAlert = false;
    this._alertTimer = 0;
    this._stepCount = 0;

    // Camera
    this._camX = 0; this._camY = 0;
    this._camTargetX = 0; this._camTargetY = 0;

    // Graphics layers (OverworldScene)
    this._objectGfx = this.add.graphics();
    this._playerGfx = this.add.graphics();
    this._uiGfx = this.add.graphics();
    this._alertGfx = this.add.graphics();

    // Tile sprite pool for overworld
    this._tilePool = [];
    this._tilePoolIdx = 0;
    for (let i = 0; i < 600; i++) {
      const spr = this.add.image(0, 0, 'kt-grass_center').setVisible(false).setOrigin(0.5, 1).setScale(TILE_SCALE);
      spr.setDepth(0);
      this._tilePool.push(spr);
    }

    // Player sprite
    this._playerSpriteOW = this.add.image(0, 0, 'char-0-idle')
      .setOrigin(0.5, 1).setScale(CHAR_SCALE).setDepth(50).setVisible(false);
    this._runFrame = 0;
    this._runFrameTimer = 0;

    // HUD elements
    this._hudName = this.add.text(26, 18, '', {
      fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: 'bold',
      color: player ? player.color : '#4af0c0'
    }).setDepth(100);
    this._hudHP = this.add.text(26, 36, '', { fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#4af0c0' }).setDepth(100);
    this._hudMP = this.add.text(26, 52, '', { fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#6366f1' }).setDepth(100);
    this._hudGold = this.add.text(206, 18, '', { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#EAB308' }).setDepth(100).setOrigin(1, 0);
    this._hudLoc = this.add.text(W/2, 16, 'Overworld', { fontFamily: "'Inter', sans-serif", fontSize: '14px', color: '#8888a0' }).setDepth(100).setOrigin(0.5, 0);
    this._hudFrags = this.add.text(W - 16, 16, '', { fontFamily: "'Inter', sans-serif", fontSize: '12px', color: '#4af0c0' }).setDepth(100).setOrigin(1, 0);
    this._promptText = this.add.text(0, 0, '[E] Enter', {
      fontFamily: "'Inter', sans-serif", fontSize: '13px', fontStyle: 'bold',
      color: '#ffdd44', shadow: { color: '#000', blur: 4, fill: true }
    }).setDepth(100).setVisible(false);
    this._controlsText = this.add.text(W/2, H - 14, 'Arrow Keys: Move  |  E: Enter Town  |  I: Inventory', {
      fontFamily: "'Inter', sans-serif", fontSize: '11px', color: '#555566'
    }).setDepth(100).setOrigin(0.5, 1);
    this._alertText = this.add.text(W/2, H/2, '!', {
      fontFamily: "'Cormorant Garamond', serif", fontSize: '80px', fontStyle: 'bold',
      color: '#ff4466', shadow: { color: '#ff0000', blur: 20, fill: true }
    }).setDepth(200).setOrigin(0.5).setVisible(false);

    // Input
    this._cursors = this.input.keyboard.createCursorKeys();
    this._keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
    this._keyI = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.I);
    this._keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this._keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this._keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
    this._keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);

    this._promptGfx = this.add.graphics().setDepth(99);

    // Town name label texts (positioned each render frame)
    this._townLabelTexts = [];
    this._mapData.objects.forEach(obj => {
      if (obj.type === 'town-entrance') {
        const ind = INDUSTRIES[obj.townId];
        if (ind) {
          const shortName = ind.name.split('/')[0].trim();
          const t = this.add.text(0, 0, shortName, {
            fontFamily: "'Inter', sans-serif", fontSize: '10px', fontStyle: 'bold',
            color: ind.color || '#4af0c0',
            shadow: { color: '#000', blur: 3, fill: true }
          }).setOrigin(0.5, 1).setDepth(98).setVisible(false);
          t._mapObj = obj;
          t._indColor = ind.color || '#4af0c0';
          this._townLabelTexts.push(t);
        }
      }
    });

    this._updateCameraImmediate();
    this.cameras.main.fadeIn(400, 10, 14, 26);
  }

  _updateCameraImmediate() {
    const pos = tileToScreen(this._px, this._py, 0, 0);
    this._camX = pos.x;
    this._camY = pos.y;
    this._camTargetX = this._camX;
    this._camTargetY = this._camY;
  }

  _tryMove(dx, dy) {
    const nx = this._px + dx, ny = this._py + dy;
    const map = this._mapData;
    if (nx < 0 || ny < 0 || nx >= map.width || ny >= map.height) return false;
    const tile = map.tiles[ny][nx];
    if (tile === TILE.WATER || tile === TILE.MOUNTAIN) return false;
    this._targetX = nx; this._targetY = ny;
    this._moving = true; this._moveTimer = 0;
    return true;
  }

  _getObjectAtPos() {
    return this._mapData.objects.find(o => o.x === this._px && o.y === this._py) || null;
  }

  _getInteractable() {
    const dirs = [[0,-1],[0,1],[-1,0],[1,0],[0,0]];
    for (const [dx, dy] of dirs) {
      const obj = this._mapData.objects.find(o => o.x === this._px + dx && o.y === this._py + dy);
      if (obj && ['town-entrance','campfire','signpost'].includes(obj.type)) return obj;
    }
    return null;
  }

  _enterTown(townId) {
    const player = this._player;
    if (!player) return;
    Audio.mapTravel();
    player.currentTown = townId;
    if (!player.unlockedTowns.includes(townId)) player.unlockedTowns.push(townId);
    this.cameras.main.fadeOut(400, 10, 14, 26);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start('Town', { townId, startX: 15, startY: 15 });
    });
  }

  _triggerEncounter() {
    const player = this._player;
    // Find nearest town for region
    const pPos = { x: this._px, y: this._py };
    let nearestTown = 'it-services', nearestDist = Infinity;
    for (const [key, pos] of Object.entries(this._mapData.townPositions)) {
      const d = Math.abs(pos.x - pPos.x) + Math.abs(pos.y - pPos.y);
      if (d < nearestDist) { nearestDist = d; nearestTown = key; }
    }
    const region = getRegionForTown(nearestTown);
    const pool = getEnemiesForRegion(region);
    const enemyId = pool[Math.floor(Math.random() * pool.length)];
    const enemy = ENEMIES[enemyId];
    if (!enemy) return;

    this.cameras.main.fadeOut(400, 10, 14, 26);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.scene.start('Battle', {
        enemy: { ...enemy, id: enemyId, currentHp: enemy.maxHp },
        region,
        returnScene: 'Overworld'
      });
    });
  }

  update(time, delta) {
    if (!this.scene.isActive('Overworld')) return;
    const dt = delta / 1000;
    const player = this._player;

    // Encounter alert animation
    if (this._showEncounterAlert) {
      this._alertTimer -= dt;
      this._alertText.setVisible(true);
      this._alertText.setAlpha(Math.abs(Math.sin(this._alertTimer * 8)));
      if (this._alertTimer <= 0) {
        this._showEncounterAlert = false;
        this._alertText.setVisible(false);
        this._triggerEncounter();
      }
      this._renderOW(time / 1000);
      this._renderHUD(player);
      return;
    }

    // Movement
    if (this._moving) {
      this._moveTimer += dt * 7;
      const t = Math.min(1, this._moveTimer);
      this._renderX = this._px + (this._targetX - this._px) * t;
      this._renderY = this._py + (this._targetY - this._py) * t;
      if (this._moveTimer >= 1) {
        this._px = this._targetX; this._py = this._targetY;
        this._renderX = this._px; this._renderY = this._py;
        this._moving = false;

        // Check for auto-trigger on town entrance
        const atObj = this._getObjectAtPos();
        if (atObj && atObj.type === 'town-entrance') {
          // Show prompt, don't auto-enter
        }

        // Random encounter check
        this._encounterCooldown -= 1;
        if (this._encounterCooldown <= 0) {
          const tile = this._mapData.tiles[this._py] && this._mapData.tiles[this._py][this._px];
          const rate = getEncounterRate(tile || TILE.GRASS);
          if (Math.random() < rate) {
            this._showEncounterAlert = true;
            this._alertTimer = 0.6;
            this._encounterCooldown = 5;
            Audio.encounter();
          }
        }
      }
    }

    // Camera lerp
    const W = this.scale.width, H = this.scale.height;
    const pos = tileToScreen(this._renderX, this._renderY, 0, 0);
    this._camTargetX = pos.x;
    this._camTargetY = pos.y;
    this._camX += (this._camTargetX - this._camX) * 0.1;
    this._camY += (this._camTargetY - this._camY) * 0.1;

    // Input
    this._moveDelay -= dt;
    if (!this._moving && this._moveDelay <= 0) {
      let moved = false;
      if (this._cursors.up.isDown || this._keyW.isDown)    { moved = this._tryMove(-1, -1); }
      else if (this._cursors.down.isDown || this._keyS.isDown)  { moved = this._tryMove(1, 1); }
      else if (this._cursors.left.isDown || this._keyA.isDown)  { moved = this._tryMove(-1, 1); }
      else if (this._cursors.right.isDown || this._keyD.isDown) { moved = this._tryMove(1, -1); }
      if (moved) {
        this._moveDelay = 0.1;
        this._stepCount++;
        if (this._stepCount % 4 === 0) Audio.footstep();
      }
    }

    // Interaction
    if (Phaser.Input.Keyboard.JustDown(this._keyE) || Phaser.Input.Keyboard.JustDown(this._keySpace)) {
      const interactable = this._getInteractable();
      if (interactable) {
        if (interactable.type === 'town-entrance') {
          this._enterTown(interactable.townId);
        } else if (interactable.type === 'campfire') {
          player.hp = player.maxHp;
          player.mp = player.maxMp;
          Audio.heal();
          this.scene.launch('Dialog', {
            name: 'Campfire', color: '#ffaa44',
            dialogue: ['You rest by the warm campfire...', 'HP and MP fully restored!'],
            parentScene: 'Overworld'
          });
          this.scene.pause('Overworld');
        } else if (interactable.type === 'signpost') {
          const indName = INDUSTRIES[interactable.townId] ? INDUSTRIES[interactable.townId].name : interactable.townId;
          this.scene.launch('Dialog', {
            name: 'Signpost', color: '#8a6a3a',
            dialogue: [`→ ${indName}`],
            parentScene: 'Overworld'
          });
          this.scene.pause('Overworld');
        }
      }
    }

    // Inventory
    if (Phaser.Input.Keyboard.JustDown(this._keyI)) {
      Audio.uiClick();
      this.scene.launch('Inventory', { parentScene: 'Overworld' });
      this.scene.pause('Overworld');
    }

    this._renderOW(time / 1000);
    this._renderHUD(player);
  }

  _renderOW(time) {
    const W = this.scale.width, H = this.scale.height;
    const map = this._mapData;
    const player = this._player;
    const offX = W/2 - this._camX;
    const offY = H/3 - this._camY;

    this._objectGfx.clear();
    this._playerGfx.clear();
    this._promptGfx.clear();

    // Reset tile pool
    this._tilePoolIdx = 0;

    // Draw tiles using sprite pool
    for (let ty = 0; ty < map.height; ty++) {
      for (let tx = 0; tx < map.width; tx++) {
        const screen = tileToScreen(tx, ty, offX, offY);
        if (screen.x < -80 || screen.x > W + 80 || screen.y < -80 || screen.y > H + 80) continue;
        const tileType = map.tiles[ty][tx];
        if (tileType === TILE.VOID) continue;

        let groundTex = TILE_TEX_MAP[tileType];
        const needsGround = [TILE.TREE, TILE.MOUNTAIN, TILE.BUILDING, TILE.WALL].includes(tileType);
        if (needsGround) groundTex = 'kt-grass_center';

        if (groundTex && this.textures.exists(groundTex) && this._tilePoolIdx < this._tilePool.length) {
          const spr = this._tilePool[this._tilePoolIdx++];
          spr.setTexture(groundTex);
          spr.setPosition(screen.x, screen.y + ISO_TH/2);
          spr.setScale(TILE_SCALE);
          spr.setDepth(ty + tx * 0.01);
          spr.setVisible(true);
          spr.setAlpha(1);
        }

        if (tileType === TILE.TREE && this._tilePoolIdx < this._tilePool.length) {
          const treeTex = (tx + ty) % 3 === 0 ? 'kt-tree_multiple' : ((tx + ty) % 3 === 1 ? 'kt-tree_pineLarge' : 'kt-tree_single');
          if (this.textures.exists(treeTex)) {
            const spr = this._tilePool[this._tilePoolIdx++];
            spr.setTexture(treeTex);
            spr.setPosition(screen.x, screen.y + ISO_TH/2);
            spr.setScale(TILE_SCALE);
            spr.setDepth(ty + tx * 0.01 + 0.5);
            spr.setVisible(true);
            spr.setAlpha(1);
          }
        } else if (tileType === TILE.MOUNTAIN && this._tilePoolIdx < this._tilePool.length) {
          const mtnTex = (tx + ty) % 2 === 0 ? 'kt-rocks_grass' : 'kt-cliff';
          if (this.textures.exists(mtnTex)) {
            const spr = this._tilePool[this._tilePoolIdx++];
            spr.setTexture(mtnTex);
            spr.setPosition(screen.x, screen.y + ISO_TH/2);
            spr.setScale(TILE_SCALE);
            spr.setDepth(ty + tx * 0.01 + 0.5);
            spr.setVisible(true);
            spr.setAlpha(1);
          }
        }
      }
    }

    // Hide unused tile pool sprites
    for (let i = this._tilePoolIdx; i < this._tilePool.length; i++) {
      this._tilePool[i].setVisible(false);
    }

    // Interactable
    const interactable = this._getInteractable();

    // Objects + player sorted
    const allDrawables = [
      ...map.objects.map(o => ({ ...o, _type: 'obj' })),
      { x: this._renderX, y: this._renderY, _type: 'player' }
    ].sort((a, b) => (a.y + a.x * 0.001) - (b.y + b.x * 0.001));

    allDrawables.forEach(drawable => {
      if (drawable._type === 'player') {
        this._drawPlayerOW(this._renderX, this._renderY, time);
        return;
      }
      const obj = drawable;
      const screen = tileToScreen(obj.x, obj.y, offX, offY);
      if (screen.x < -80 || screen.x > W + 80 || screen.y < -80 || screen.y > H + 80) return;

      if (obj.type === 'town-entrance') {
        const ind = INDUSTRIES[obj.townId];
        const indColor = ind ? Hex2Int(ind.color) : 0x4af0c0;
        const isUnlocked = player && player.unlockedTowns.includes(obj.townId);
        const isCompleted = player && player.completedTowns.includes(obj.townId);
        const pulse = 0.6 + Math.sin(time * 2 + obj.x) * 0.3;

        // Draw a castle tower icon for town entrances if we have the texture
        if (this.textures.exists('kt-castle_tower')) {
          this._objectGfx.fillStyle(indColor, isUnlocked ? pulse * 0.3 : 0.1);
          this._objectGfx.fillCircle(screen.x, screen.y, 22);
        } else {
          this._objectGfx.fillStyle(indColor, isUnlocked ? pulse * 0.4 : 0.15);
          this._objectGfx.fillCircle(screen.x, screen.y, 18);
        }
        this._objectGfx.fillStyle(indColor, isUnlocked ? 0.9 : 0.3);
        this._objectGfx.fillCircle(screen.x, screen.y, 10);
        if (isCompleted) {
          this._objectGfx.lineStyle(2, 0xFFD700, 0.8);
          this._objectGfx.strokeCircle(screen.x, screen.y, 22);
        }

        const isNearby = Math.abs(obj.x - this._px) <= 3 && Math.abs(obj.y - this._py) <= 3;
        if (isNearby && ind) {
          this._objectGfx.lineStyle(2, indColor, 0.6);
          this._objectGfx.strokeCircle(screen.x, screen.y, 26);
        }

        if (interactable && interactable.x === obj.x && interactable.y === obj.y) {
          this._promptGfx.fillStyle(0x000000, 0.6);
          this._promptGfx.fillRoundedRect(screen.x - 30, screen.y - 52, 60, 20, 4);
          this._promptGfx.lineStyle(1, 0xffdd44, 0.8);
          this._promptGfx.strokeRoundedRect(screen.x - 30, screen.y - 52, 60, 20, 4);
          this._promptText.setPosition(screen.x, screen.y - 42)
            .setText('[E] Enter ' + (ind ? ind.name.split('/')[0].trim() : ''))
            .setVisible(true);
        }
      } else if (obj.type === 'campfire') {
        const fp = 0.4 + Math.sin(time * 6 + obj.x) * 0.3;
        this._objectGfx.fillStyle(0xff7700, fp);
        this._objectGfx.fillCircle(screen.x, screen.y - 6, 8);
        this._objectGfx.fillStyle(0xffcc00, fp * 0.8);
        this._objectGfx.fillCircle(screen.x, screen.y - 8, 5);
        this._objectGfx.fillStyle(0x3a2a10, 1);
        this._objectGfx.fillRect(screen.x - 6, screen.y - 4, 12, 6);
        if (interactable && interactable.x === obj.x && interactable.y === obj.y) {
          this._promptText.setPosition(screen.x, screen.y - 26).setText('[E] Rest').setVisible(true);
        }
      } else if (obj.type === 'signpost') {
        this._objectGfx.fillStyle(0x8a6a3a, 1);
        this._objectGfx.fillRect(screen.x - 2, screen.y - 16, 4, 20);
        this._objectGfx.fillStyle(0xaa8a4a, 1);
        this._objectGfx.fillRect(screen.x - 12, screen.y - 20, 24, 8);
      }
    });

    if (!interactable) this._promptText.setVisible(false);

    // Update town label positions
    if (this._townLabelTexts) {
      this._townLabelTexts.forEach(t => {
        const obj = t._mapObj;
        const s = tileToScreen(obj.x, obj.y, offX, offY);
        if (s.x > -60 && s.x < W + 60 && s.y > -60 && s.y < H + 60) {
          t.setPosition(s.x, s.y - 32).setVisible(true);
        } else {
          t.setVisible(false);
        }
      });
    }

    // Minimap
    this._drawMinimap(time);
  }

  _drawPlayerOW(tx, ty, time) {
    const W = this.scale.width, H = this.scale.height;
    const screen = tileToScreen(tx, ty, W/2 - this._camX, H/3 - this._camY);
    const bob = Math.sin(time * 3) * 1;

    // Update run animation
    if (this._moving) {
      this._runFrameTimer += 0.016;
      if (this._runFrameTimer > 0.08) {
        this._runFrameTimer = 0;
        this._runFrame = (this._runFrame + 1) % 10;
      }
      const runTex = 'char-0-run' + this._runFrame;
      if (this.textures.exists(runTex)) {
        this._playerSpriteOW.setTexture(runTex);
      }
    } else {
      this._runFrame = 0;
      if (this.textures.exists('char-0-idle')) {
        this._playerSpriteOW.setTexture('char-0-idle');
      }
    }

    this._playerSpriteOW.setPosition(screen.x, screen.y + ISO_TH/2 - 6 + bob);
    this._playerSpriteOW.setDepth(50);
    this._playerSpriteOW.setVisible(true);

    // Shadow
    this._playerGfx.fillStyle(0x000000, 0.25);
    this._playerGfx.fillEllipse(screen.x, screen.y + 14, 22, 8);
  }

  _drawMinimap(time) {
    const W = this.scale.width, H = this.scale.height;
    const map = this._mapData;
    const player = this._player;
    const mmW = 150, mmH = 110;
    const mmX = W - mmW - 14, mmY = 42;
    const scaleX = (mmW - 10) / map.width;
    const scaleY = (mmH - 10) / map.height;

    this._uiGfx.clear();
    // HUD panel
    this._uiGfx.fillStyle(0x0a0e1a, 0.85);
    this._uiGfx.lineStyle(1, 0x2a2a4a, 1);
    this._uiGfx.strokeRect(8, 8, 220, 70);
    this._uiGfx.fillRect(8, 8, 220, 70);
    if (player) {
      this._uiGfx.fillStyle(Hex2Int(player.color), 0.15);
      this._uiGfx.fillRect(8, 8, 220, 4);
      drawBar(this._uiGfx, 20, 44, 190, 10, player.hp, player.maxHp, 0x4af0c0, 0x0a2020);
      drawBar(this._uiGfx, 20, 58, 190, 10, player.mp, player.maxMp, 0x6366f1, 0x0a0a20);
    }

    // Minimap
    this._uiGfx.fillStyle(0x080c18, 0.9);
    this._uiGfx.lineStyle(1, 0x2a2a4a, 1);
    this._uiGfx.strokeRect(mmX, mmY, mmW, mmH);
    this._uiGfx.fillRect(mmX, mmY, mmW, mmH);

    // Draw terrain
    for (let y = 0; y < map.height; y += 2) {
      for (let x = 0; x < map.width; x += 2) {
        const tile = map.tiles[y][x];
        let color = null;
        switch (tile) {
          case TILE.GRASS: color = 0x1e3e1e; break;
          case TILE.WATER: color = 0x144c88; break;
          case TILE.ROAD:  case TILE.COBBLE: color = 0x3a3a4e; break;
          case TILE.TREE:  color = 0x143414; break;
          case TILE.MOUNTAIN: color = 0x3a3a4e; break;
        }
        if (color) {
          this._uiGfx.fillStyle(color, 1);
          this._uiGfx.fillRect(mmX + 5 + x * scaleX, mmY + 5 + y * scaleY, Math.max(1, scaleX * 2), Math.max(1, scaleY * 2));
        }
      }
    }

    // Town markers
    if (map.objects && player) {
      map.objects.forEach(obj => {
        if (obj.type === 'town-entrance') {
          const ind = INDUSTRIES[obj.townId];
          const c = ind ? Hex2Int(ind.color) : 0xffffff;
          const isUnlocked = player.unlockedTowns.includes(obj.townId);
          this._uiGfx.fillStyle(c, isUnlocked ? 1 : 0.3);
          this._uiGfx.fillRect(mmX + 5 + obj.x * scaleX - 1.5, mmY + 5 + obj.y * scaleY - 1.5, 4, 4);
        }
      });
    }

    // Player dot (blinking)
    const blink = Math.sin(time * 6) > 0;
    this._uiGfx.fillStyle(blink ? 0xffffff : (player ? Hex2Int(player.color) : 0xffffff), 1);
    this._uiGfx.fillRect(mmX + 5 + this._px * scaleX - 2, mmY + 5 + this._py * scaleY - 2, 5, 5);
  }

  _renderHUD(player) {
    if (!player) return;
    this._hudName.setText(`${player.name}  Lv.${player.level}`).setColor(player.color);
    this._hudHP.setText(`HP: ${Math.ceil(player.hp)} / ${player.maxHp}`);
    this._hudMP.setText(`MP: ${Math.ceil(player.mp)} / ${player.maxMp}`);
    this._hudGold.setText(`${player.gold}g`);
    this._hudFrags.setText(`◆ ${player.cognitiveFragments.length}/14`);
  }
}

/* ==========================================================================
   BATTLE SCENE
   ========================================================================== */
class BattleScene extends Phaser.Scene {
  constructor() { super({ key: 'Battle' }); }

  init(data) {
    this._enemy = { ...data.enemy, currentHp: data.enemy.maxHp };
    this._region = data.region || 'digital';
    this._returnScene = data.returnScene || 'Overworld';
    this._isBoss = data.isBoss || false;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    const player = this.registry.get('player');
    this._player = player;
    this._combatPlayer = {
      hp: player.hp, maxHp: player.maxHp,
      mp: player.mp, maxMp: player.maxMp,
      atk: player.atk, def: player.def,
      spd: player.spd, int: player.int,
      statusEffect: null, statusTurns: 0,
      defending: false, buffAtk: 0, buffDef: 0, buffTurns: 0,
      helperTurns: 0, viralDmg: 0, viralTurns: 0
    };
    this._phase = 'choose'; // choose | player-anim | enemy-turn | enemy-anim | result
    this._animTimer = 0;
    this._resultTimer = 0;
    this._result = null;
    this._log = [];
    this._selectedAction = 0;
    this._showAbilities = false;
    this._showItems = false;
    this._selectedAbilityIdx = 0;
    this._selectedItemIdx = 0;
    this._shakeTarget = null;
    this._shakeTimer = 0;
    this._floatingTexts = [];

    // Background
    const bgKey = getBattleBgForRegion(this._region);
    if (this.textures.exists(bgKey)) {
      const bg = this.add.image(W/2, H/2, bgKey).setDisplaySize(W, H);
      this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 0.45);
    } else {
      this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 1);
      // Gradient effect
      const g = this.add.graphics();
      g.fillGradientStyle(0x0a0e1a, 0x1a1440, 0x0a0e1a, 0x0a1a2a, 1);
      g.fillRect(0, 0, W, H);
    }

    // Graphics layers
    this._bg2Gfx = this.add.graphics();
    this._enemyGfx = this.add.graphics();
    this._playerGfx = this.add.graphics();
    this._uiGfx = this.add.graphics();
    this._floatGfx = this.add.graphics();

    // Enemy name/info
    this._enemyNameText = this.add.text(W * 0.75, H * 0.12, this._enemy.name, {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: '26px', fontStyle: 'bold', color: '#ffffff',
      shadow: { color: '#000', blur: 8, fill: true }
    }).setOrigin(0.5, 0.5).setDepth(50);
    this._enemyLvlText = this.add.text(W * 0.75, H * 0.18, `Level ${this._enemy.level}`, {
      fontFamily: "'Inter', sans-serif",
      fontSize: '14px', color: '#8888a0'
    }).setOrigin(0.5, 0.5).setDepth(50);

    // Player name
    this._playerNameText = this.add.text(W * 0.12, H * 0.62, `${player.name}  Lv.${player.level}`, {
      fontFamily: "'Inter', sans-serif",
      fontSize: '15px', fontStyle: 'bold', color: player.color
    }).setOrigin(0, 0.5).setDepth(50);

    // Action buttons
    this._actionBtns = [];
    const actions = ['Attack', 'Defend', 'Ability', 'Item'];
    const btnColors = [0xff4444, 0x3B82F6, 0xA855F7, 0xF59E0B];
    actions.forEach((label, i) => {
      const bx = W * 0.05 + (i % 2) * (W * 0.18);
      const by = H * 0.78 + Math.floor(i / 2) * 46;
      const btnGfx = this.add.graphics().setDepth(51);
      const btnTxt = this.add.text(bx + (W * 0.16) / 2, by + 19, label, {
        fontFamily: "'Inter', sans-serif",
        fontSize: '16px', fontStyle: 'bold', color: '#e8e8ec'
      }).setOrigin(0.5).setDepth(52);
      const zone = this.add.zone(bx + (W * 0.16) / 2, by + 19, W * 0.16, 38).setInteractive({ cursor: 'pointer' }).setDepth(52);
      zone.on('pointerdown', () => {
        if (this._phase !== 'choose' || this._showAbilities || this._showItems) return;
        this._selectedAction = i;
        this._executeAction(actions[i]);
      });
      this._actionBtns.push({ gfx: btnGfx, txt: btnTxt, bx, by, label, color: btnColors[i], zone, idx: i });
    });

    // Ability/Item sub-menu container
    this._subMenuGfx = this.add.graphics().setDepth(60);
    this._subMenuItems = [];

    // Combat log
    this._logGfx = this.add.graphics().setDepth(50);
    this._logTexts = [];
    for (let i = 0; i < 5; i++) {
      this._logTexts.push(this.add.text(W * 0.57, H * 0.72 + i * 18, '', {
        fontFamily: "'Inter', sans-serif",
        fontSize: '12px', color: '#8888a0'
      }).setDepth(51));
    }

    // Floating text pool
    this._floatTextObjects = [];
    for (let i = 0; i < 8; i++) {
      this._floatTextObjects.push(this.add.text(0, 0, '', {
        fontFamily: "'Inter', sans-serif",
        fontSize: '20px', fontStyle: 'bold', color: '#ffffff',
        shadow: { color: '#000', blur: 4, fill: true }
      }).setDepth(200).setVisible(false));
    }

    // Input
    this._cursors = this.input.keyboard.createCursorKeys();
    this._keyEnter = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this._keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._keyEsc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

    this._addLog(`Battle starts! ${player.name} vs ${this._enemy.name}!`);
    this.cameras.main.fadeIn(400, 10, 14, 26);
  }

  _addLog(msg, color) {
    this._log.push({ msg, color: color || '#e8e8ec' });
    const logStart = Math.max(0, this._log.length - 5);
    this._log.slice(logStart).forEach((entry, i) => {
      if (this._logTexts[i]) {
        this._logTexts[i].setText(entry.msg).setColor(i === this._log.length - logStart - 1 ? '#e8e8ec' : '#666677');
      }
    });
  }

  _spawnFloat(text, x, y, color) {
    const ft = this._floatTextObjects.find(t => !t.visible);
    if (!ft) return;
    ft.setPosition(x, y).setText(text).setColor(color || '#ffffff').setAlpha(1).setVisible(true);
    this.tweens.add({
      targets: ft,
      y: y - 50, alpha: 0,
      duration: 900, ease: 'Power2',
      onComplete: () => ft.setVisible(false)
    });
  }

  _executeAction(action) {
    const cp = this._combatPlayer, enemy = this._enemy, player = this._player;
